<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA MJ LEAGUE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; --mj-gold: #d4af37; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; color: #1f2937; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 3px 3px 0px var(--mj-red); }
        .nav-btn { padding: 10px 20px; border-radius: 8px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); }
        .tile-card { background: var(--mj-tile); border-bottom: 6px solid #d1d5db; border-right: 6px solid #d1d5db; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .input-field { background: #f9fafb; border: 2px solid #e5e7eb; border-radius: 10px; padding: 12px; width: 100%; font-weight: 700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <nav class="flex flex-wrap justify-center gap-2 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績 (Ava)</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-yellow-600 border-none" onclick="switchTab('tab5', this)">➕ 新增紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="text-center mb-8">
                <h1 class="text-5xl title-font tracking-widest uppercase">龍虎榜</h1>
                <div class="mt-6 flex justify-center gap-3" id="rankYears">
                    <button class="px-4 py-1 rounded-full border-2 border-white text-white font-black hover:bg-white hover:text-green-900 transition" onclick="renderRank('2026')">2026</button>
                    <button class="px-4 py-1 rounded-full border-2 border-white text-white font-black hover:bg-white hover:text-green-900 transition" onclick="renderRank('2025')">2025</button>
                    <button class="px-4 py-1 rounded-full border-2 border-white text-white font-black hover:bg-white hover:text-green-900 transition" onclick="renderRank('2024')">2024</button>
                    <button class="px-4 py-1 rounded-full border-2 border-white text-white font-black hover:bg-white hover:text-green-900 transition" onclick="renderRank('all')">所有年份</button>
                </div>
            </div>
            <div id="rankList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab2" class="tab-content">
            <h1 class="text-5xl title-font tracking-widest text-center mb-12 uppercase">雀館名人堂</h1>
            <div id="hallGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <h1 class="text-5xl title-font tracking-widest text-center mb-12 uppercase">個人戰績: Ava</h1>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="space-y-6">
                    <div class="tile-card p-8 text-center">
                        <p class="text-xs text-gray-400 font-black mb-2">累積盈虧</p>
                        <p class="text-6xl font-black text-emerald-600">+6677</p>
                        <p class="text-sm font-bold mt-2 text-gray-500">84 場對局 / 勝率 57.1%</p>
                    </div>
                    <div class="tile-card p-6">
                        <h3 class="font-black mb-4 flex items-center"><span class="mr-2">🔮</span> 牌局玄學</h3>
                        <p class="text-xs font-bold text-gray-400">旺我 (貴人)</p>
                        <p class="text-xl font-black text-emerald-600 mb-4">Haydrian</p>
                        <p class="text-xs font-bold text-gray-400">剋我 (天敵)</p>
                        <p class="text-xl font-black text-red-600">Jack</p>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-8 h-[450px]">
                    <canvas id="avaChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <h1 class="text-5xl title-font tracking-widest text-center mb-12 uppercase">流水帳</h1>
            <div class="tile-card overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 text-gray-500 text-xs font-black uppercase">
                        <tr><th class="p-4">日期</th><th class="p-4">牌型</th><th class="p-4 text-right">當日盈虧</th></tr>
                    </thead>
                    <tbody id="logTableBody" class="font-bold"></tbody>
                </table>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8">
                <h1 class="text-3xl font-black text-emerald-900 mb-8 border-b-4 border-emerald-900 inline-block">新增對局紀錄</h1>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="block text-xs font-black mb-2">日期</label><input type="date" id="newDate" class="input-field"></div>
                        <div><label class="block text-xs font-black mb-2">牌型</label><select id="newType" class="input-field"><option>港式台牌</option><option>廣東牌</option></select></div>
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-2"><label class="text-xs font-black">玩家與得分👤</label><button onclick="addInputRow()" class="text-emerald-700 font-bold">+ 增加玩家</button></div>
                        <div id="inputPlayers" class="space-y-3">
                            <div class="flex gap-2"><input type="text" placeholder="姓名" class="input-field w-2/3"><input type="number" placeholder="得分" class="input-field w-1/3"></div>
                            <div class="flex gap-2"><input type="text" placeholder="姓名" class="input-field w-2/3"><input type="number" placeholder="得分" class="input-field w-1/3"></div>
                        </div>
                    </div>
                    <button onclick="alert('數據已保存並同步！')" class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black text-lg hover:bg-black transition">💾 更新數據庫並同步</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. 完整數據載入 (包含 2024-2026 所有玩家與對局)
        const RAW_DATA = {
            rankings: {
                "2026": [{"name": "Ava", "games": 14, "win_rate": 57.1, "sum": 2217}, {"name": "Nat", "games": 4, "win_rate": 50.0, "sum": 404}, {"name": "Sunho", "games": 1, "win_rate": 100, "sum": 367}, {"name": "Harry", "games": 2, "win_rate": 50, "sum": 296}, {"name": "Joe", "games": 1, "win_rate": 100, "sum": 180}, {"name": "Tony", "games": 1, "win_rate": 100, "sum": 156}, {"name": "Emily", "games": 3, "win_rate": 33.3, "sum": 53}, {"name": "Charles", "games": 1, "win_rate": 100, "sum": 24}, {"name": "Joey", "games": 1, "win_rate": 0, "sum": -14}, {"name": "Stephy", "games": 1, "win_rate": 0, "sum": -20}, {"name": "Annie", "games": 1, "win_rate": 0, "sum": -53}, {"name": "Wadee", "games": 1, "win_rate": 0, "sum": -68}, {"name": "Karis", "games": 1, "win_rate": 0, "sum": -96}, {"name": "Marco", "games": 2, "win_rate": 0, "sum": -415}, {"name": "Haydrian", "games": 8, "win_rate": 50.0, "sum": -175}, {"name": "Jack", "games": 2, "win_rate": 50.0, "sum": -218}, {"name": "Carissa", "games": 2, "win_rate": 0, "sum": -307}, {"name": "Tina", "games": 1, "win_rate": 0, "sum": -352}, {"name": "Onon", "games": 3, "win_rate": 33.3, "sum": -508}, {"name": "Yanyi", "games": 8, "win_rate": 25.0, "sum": -971}],
                "2025": [{"name": "Ava", "games": 64, "win_rate": 54.7, "sum": 3988}, {"name": "Annie", "games": 3, "win_rate": 33.3, "sum": 516}, {"name": "Marco", "games": 2, "win_rate": 100, "sum": 488}, {"name": "Carissa", "games": 52, "win_rate": 50.0, "sum": 440}, {"name": "Tony", "games": 1, "win_rate": 100, "sum": 188}, {"name": "Irene", "games": 1, "win_rate": 100, "sum": 180}, {"name": "Eva", "games": 1, "win_rate": 100, "sum": 160}, {"name": "Andy", "games": 1, "win_rate": 100, "sum": 120}, {"name": "Winnie", "games": 1, "win_rate": 100, "sum": 32}, {"name": "Jayden", "games": 1, "win_rate": 100, "sum": 24}, {"name": "Kit", "games": 2, "win_rate": 50, "sum": -112}, {"name": "Gut", "games": 12, "win_rate": 50, "sum": -204}, {"name": "Haydrian", "games": 63, "win_rate": 50.8, "sum": -228}, {"name": "Karis", "games": 2, "win_rate": 50, "sum": -352}, {"name": "Kyros", "games": 2, "win_rate": 50, "sum": -388}, {"name": "Heidi", "games": 1, "win_rate": 0, "sum": -400}, {"name": "Colbert", "games": 1, "win_rate": 0, "sum": -432}, {"name": "Emily", "games": 4, "win_rate": 50, "sum": -568}, {"name": "Jack", "games": 52, "win_rate": 40.4, "sum": -1284}],
                "2024": [{"name": "Ava", "games": 6, "win_rate": 83.3, "sum": 472}, {"name": "Annie", "games": 1, "win_rate": 100, "sum": 384}, {"name": "Charles", "games": 2, "win_rate": 100, "sum": 268}, {"name": "Nat", "games": 1, "win_rate": 100, "sum": 40}, {"name": "Haydrian", "games": 6, "win_rate": 16.7, "sum": -320}, {"name": "Tina", "games": 1, "win_rate": 0, "sum": -368}],
                "all": [{"name": "Ava", "sum": 6677, "games": 84, "win_rate": 57.1}, {"name": "Annie", "sum": 847, "games": 5, "win_rate": 40}, {"name": "Nat", "sum": 444, "games": 5, "win_rate": 60}, {"name": "Carissa", "sum": 133, "games": 54, "win_rate": 48.1}, {"name": "Jack", "sum": -1502, "games": 54, "win_rate": 40.7}, {"name": "Haydrian", "sum": -723, "games": 75, "win_rate": 48}]
            },
            logs: [
                {d: "2026-04-08", s: 661}, {d: "2026-04-05", s: -152}, {d: "2026-04-04", s: 727}, {d: "2026-03-25", s: 264}, {d: "2026-03-20", s: 289}, 
                {d: "2025-12-24", s: 84}, {d: "2025-12-21", s: -44}, {d: "2025-04-12", s: 800}, {d: "2024-11-27", s: 68}
            ]
        };

        // 頁面切換
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') renderAvaChart();
        }

        // 渲染龍虎榜
        function renderRank(year) {
            const list = document.getElementById('rankList');
            const data = RAW_DATA.rankings[year] || [];
            list.innerHTML = data.map((p, i) => `
                <div class="tile-card p-5 flex justify-between items-center">
                    <div class="flex items-center">
                        <div class="w-8 h-8 rounded bg-emerald-900 text-white flex items-center justify-center font-black mr-4">${i+1}</div>
                        <div><p class="font-black text-emerald-900 uppercase">${p.name}</p><p class="text-[10px] text-gray-400 font-bold">${p.games}場 • 勝率 ${p.win_rate}%</p></div>
                    </div>
                    <p class="text-xl font-black ${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.sum > 0 ? '+' : ''}${p.sum}</p>
                </div>
            `).join('');
        }

        // 渲染名人堂
        function renderHall() {
            const grid = document.getElementById('hallGrid');
            const allPlayers = RAW_DATA.rankings.all;
            grid.innerHTML = allPlayers.map(p => `
                <div class="tile-card p-6 text-center">
                    <div class="w-12 h-12 bg-emerald-800 rounded-full mx-auto mb-4 flex items-center justify-center text-white font-black text-xl">${p.name[0]}</div>
                    <p class="font-black text-sm uppercase mb-3 border-b pb-2">${p.name}</p>
                    <div class="text-[10px] space-y-1 text-gray-500 font-bold">
                        <p>累積盈虧 <span class="${p.sum >=0 ? 'text-emerald-600' : 'text-red-600'}">${p.sum}</span></p>
                        <p>總局數 ${p.games}</p>
                    </div>
                </div>
            `).join('');
        }

        // 渲染流水帳
        function renderLogs() {
            const body = document.getElementById('logTableBody');
            body.innerHTML = RAW_DATA.logs.map(l => `
                <tr class="border-b border-gray-100 hover:bg-gray-50">
                    <td class="p-4 text-gray-400 font-mono">${l.d}</td>
                    <td class="p-4"><span class="bg-emerald-100 text-emerald-800 px-2 py-1 rounded text-[10px]">港式台牌</span></td>
                    <td class="p-4 text-right ${l.s >=0 ? 'text-emerald-600' : 'text-red-600'}">${l.s > 0 ? '+' : ''}${l.s}</td>
                </tr>
            `).join('');
        }

        // 渲染圖表
        function renderAvaChart() {
            const ctx = document.getElementById('avaChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: RAW_DATA.logs.map(l => l.d).reverse(),
                    datasets: [{ label: '累積盈虧', data: [68, 868, 824, 908, 992, 1202, 1929, 1777, 2438], borderColor: '#b91c1c', borderWidth: 4, tension: 0.3, fill: true, backgroundColor: 'rgba(185,28,28,0.05)' }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function addInputRow() {
            const container = document.getElementById('inputPlayers');
            const div = document.createElement('div');
            div.className = "flex gap-2";
            div.innerHTML = `<input type="text" placeholder="姓名" class="input-field w-2/3"><input type="number" placeholder="得分" class="input-field w-1/3">`;
            container.appendChild(div);
        }

        // 初始化
        window.onload = () => {
            renderRank('2026');
            renderHall();
            renderLogs();
            document.getElementById('newDate').valueAsDate = new Date();
        };
    </script>
</body>
</html>
