<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; --mj-gold: #d4af37; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-sm" onclick="updateRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2025')">2025</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2024')">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 text-center bg-white">
                        <p class="text-xs font-black text-gray-400 mb-2">累積總盈虧</p>
                        <p id="totalProfit" class="text-6xl font-black text-emerald-600">+6677</p>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學 (數據分析)</h3>
                        <div class="space-y-4 text-sm">
                            <div>
                                <p class="text-emerald-600 font-black mb-1">最旺貴人 (同場贏最多)</p>
                                <p class="font-bold">1. Haydrian (+2,204) / 2. Annie (+847)</p>
                            </div>
                            <div>
                                <p class="text-red-600 font-black mb-1">剋星天敵 (同場輸最多)</p>
                                <p class="font-bold">1. Jack (-1,502) / 2. Emily (-1,015)</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 bg-white h-[500px]">
                    <canvas id="avaLineChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 font-black text-sm border-b">
                        <tr>
                            <th class="p-4">日期</th>
                            <th class="p-4">對局詳細戰績</th>
                        </tr>
                    </thead>
                    <tbody id="logList" class="divide-y divide-gray-50 font-bold text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white">
                <h3 class="text-2xl font-black mb-6">錄入新戰局</h3>
                <div class="space-y-4">
                    <input type="date" id="newDate" class="w-full p-3 border-2 rounded-xl font-bold">
                    <div id="inputPlayers" class="space-y-3">
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                    </div>
                    <button class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black" onclick="addNewRecord()">💾 即時同步數據</button>
                    <p class="text-[10px] text-gray-400 text-center">提示：四位玩家得分總和必須等於 0 才能成功儲存。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心數據 (已整合 Excel 數據)
        const DATA = {
            players: [
                {name: "Ava", sum: 6677, games: 84, winRate: 57.1, max: 800, icon: "👑", title: "雀壇傳奇", yearly: {"2024": 472, "2025": 3988, "2026": 2217}},
                {name: "Annie", sum: 847, games: 5, winRate: 40, max: 1032, icon: "🔥", title: "火力全開", yearly: {"2024": 384, "2025": 516, "2026": -53}},
                {name: "Nat", sum: 444, games: 5, winRate: 60, max: 668, icon: "🕶️", title: "計謀大師", yearly: {"2024": 40, "2025": 0, "2026": 404}},
                {name: "Emily", sum: -1015, games: 7, winRate: 42.9, max: 192, icon: "🌸", title: "截糊高手", yearly: {"2024": 0, "2025": -568, "2026": -500}},
                {name: "Haydrian", sum: -723, games: 77, winRate: 48.1, max: 736, icon: "💸", title: "大慈善家", yearly: {"2024": -320, "2025": -228, "2026": -175}},
                {name: "Jack", sum: -1502, games: 54, winRate: 40.7, max: 612, icon: "🤡", title: "送財童子", yearly: {"2024": 0, "2025": -1284, "2026": -218}}
            ],
            // 每一局的詳細戰績 (流水帳)
            fullLogs: [
                {d: "2026-04-08", results: {"Ava": 661, "Haydrian": -200, "Emily": -400, "Jack": -61}},
                {d: "2026-04-05", results: {"Ava": -152, "Annie": -53, "Charles": 24, "Nat": 181}},
                {d: "2026-04-04", results: {"Ava": 727, "Jack": -218, "Haydrian": -500, "Emily": -9}}
            ]
        };

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') renderChart();
        }

        function updateRank(year) {
            const container = document.getElementById('rankContainer');
            let sorted = [...DATA.players].map(p => ({
                ...p,
                currentSum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            })).sort((a,b) => b.currentSum - a.currentSum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic">${i+1}</span>
                        <div class="text-2xl">${p.icon}</div>
                        <div><p class="font-black text-emerald-900">${p.name}</p><p class="text-[10px] text-gray-400 uppercase">${p.title}</p></div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.currentSum>=0?'text-emerald-600':'text-red-600'}">${p.currentSum>0?'+':''}${p.currentSum}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = DATA.players.sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-5 bg-white">
                    <div class="flex justify-between mb-4"><div class="text-3xl">${p.icon}</div><div class="text-[10px] font-black uppercase text-gray-400">${p.title}</div></div>
                    <h3 class="text-xl font-black text-emerald-900 mb-4">${p.name}</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">出席</p><p class="font-bold">${p.games}</p></div>
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">盈虧</p><p class="font-bold ${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = DATA.fullLogs.sort((a,b) => b.d.localeCompare(a.d)).map(l => `
                <tr>
                    <td class="p-4 text-gray-400 font-mono w-32">${l.d}</td>
                    <td class="p-4">
                        <div class="flex flex-wrap gap-2">
                            ${Object.entries(l.results).map(([name, score]) => `
                                <span class="px-2 py-1 rounded-lg text-xs font-bold ${score >=0 ? 'bg-emerald-50 text-emerald-700' : 'bg-red-50 text-red-700'}">
                                    ${name}: ${score > 0 ? '+' : ''}${score}
                                </span>
                            `).join('')}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        let myChart = null;
        function renderChart() {
            const ctx = document.getElementById('avaLineChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            let cumulative = 0;
            const avaData = DATA.fullLogs.filter(l => l.results["Ava"] !== undefined).sort((a,b) => a.d.localeCompare(b.d)).map(l => {
                cumulative += l.results["Ava"];
                return {x: l.d, y: cumulative};
            });

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: avaData.map(d => d.x),
                    datasets: [{
                        label: 'Ava 累積盈虧',
                        data: avaData.map(d => d.y),
                        borderColor: '#064e3b',
                        borderWidth: 4,
                        fill: true,
                        backgroundColor: 'rgba(6,78,59,0.05)',
                        tension: 0.4 // 平滑曲線
                    }]
                },
                options: { maintainAspectRatio: false }
            });
            document.getElementById('totalProfit').innerText = (cumulative > 0 ? '+' : '') + cumulative;
        }

        function addNewRecord() {
            const date = document.getElementById('newDate').value;
            const names = Array.from(document.querySelectorAll('.pName')).map(i => i.value.trim());
            const scores = Array.from(document.querySelectorAll('.pScore')).map(i => parseInt(i.value) || 0);

            if (!date || names.some(n => !n)) return alert("請填寫日期及所有玩家姓名！");
            if (scores.reduce((a, b) => a + b, 0) !== 0) return alert("錯誤：四人得分總和不等於 0，請檢查！");

            // 1. 加入流水帳
            const newRes = {};
            names.forEach((n, i) => newRes[n] = scores[i]);
            DATA.fullLogs.push({d: date, results: newRes});

            // 2. 更新玩家數據
            names.forEach((name, i) => {
                let p = DATA.players.find(x => x.name === name);
                if (!p) {
                    p = {name: name, sum: 0, games: 0, winRate: 50, max: 0, icon: "👤", title: "新面孔", yearly: {}};
                    DATA.players.push(p);
                }
                p.sum += scores[i];
                p.games += 1;
                const year = date.split('-')[0];
                p.yearly[year] = (p.yearly[year] || 0) + scores[i];
            });

            alert("數據已即時同步！");
            updateRank('all');
            renderHall();
            renderLogs();
        }

        window.onload = () => {
            document.getElementById('newDate').valueAsDate = new Date();
            updateRank('all');
            renderHall();
            renderLogs();
        };
    </script>
</body>
</html>
