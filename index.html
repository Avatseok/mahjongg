<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-2 mb-8 text-sm">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="tile-card bg-white overflow-hidden shadow-xl">
                <div id="rankList" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="tile-card p-6 text-center bg-white flex flex-col justify-center">
                    <p class="text-xs font-black text-gray-400 mb-1">累積總盈虧</p>
                    <p class="text-5xl font-black text-emerald-600">+6677</p>
                </div>
                <div class="md:col-span-2 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-3 border-b pb-2">🔮 牌局玄學</h3>
                    <div class="grid grid-cols-2 gap-4 text-xs">
                        <div>
                            <p class="text-emerald-600 font-black mb-1">最旺貴人</p>
                            <p class="font-bold leading-relaxed">1. Haydrian (+2450)<br>2. Annie (+1120)</p>
                        </div>
                        <div>
                            <p class="text-red-600 font-black mb-1">剋星天敵</p>
                            <p class="font-bold leading-relaxed">1. Jack (-1840)<br>2. Emily (-920)</p>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-3 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4">🀄 玩法盈虧分析</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                            <p class="text-xs font-bold text-emerald-800">港式台牌</p>
                            <p class="text-3xl font-black text-emerald-600">+5,240</p>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                            <p class="text-xs font-bold text-blue-800">廣東牌</p>
                            <p class="text-3xl font-black text-blue-600">+1,437</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-4"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="tile-card p-8 bg-white max-w-lg mx-auto">
                <h3 class="font-black text-emerald-900 mb-6 text-center">➕ 快速新增對局</h3>
                <div class="space-y-4">
                    <input type="date" id="inputDate" class="w-full border-2 border-gray-100 rounded-xl p-3">
                    <select id="inputType" class="w-full border-2 border-gray-100 rounded-xl p-3">
                        <option value="港式台牌">港式台牌</option>
                        <option value="廣東牌">廣東牌</option>
                    </select>
                    <textarea id="inputScores" class="w-full border-2 border-gray-100 rounded-xl p-3 h-32" placeholder="格式: Ava +661, Annie -53, Haydrian -256..."></textarea>
                    <button onclick="addLog()" class="w-full bg-emerald-900 text-white font-black py-4 rounded-xl shadow-lg">儲存並同步數據</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PLAYERS_DATA = [
            {name: "Ava", sum: 6677, games: 84, winRate: 57.1, icon: "👑", title: "雀壇傳奇"},
            {name: "Annie", sum: 847, games: 5, winRate: 40.0, icon: "🔥", title: "火力全開"},
            {name: "Nat", sum: 444, games: 5, winRate: 60.0, icon: "🕶️", title: "冷面笑匠"},
            {name: "Charles", sum: 292, games: 3, winRate: 100, icon: "💎", title: "鑽石玩家"},
            {name: "Carissa", sum: 133, games: 54, winRate: 48.1, icon: "🐱", title: "穩健派"},
            {name: "Haydrian", sum: -723, games: 77, winRate: 48.1, icon: "💸", title: "大慈善家"},
            {name: "Jack", sum: -1502, games: 54, winRate: 40.7, icon: "🤡", title: "送財童子"}
        ];

        const INITIAL_LOGS = [
            {d: "2026-04-08", t: "港式台牌", s: "Ava +661, Annie -53, Haydrian -256, Tina -352"},
            {d: "2026-04-05", t: "港式台牌", s: "Ava -152, Haydrian +304, Jack +19, Carissa -171"},
            {d: "2026-04-04", t: "港式台牌", s: "Ava +727, Haydrian +37, Emily -500, Marco -264"},
            {d: "2026-03-25", t: "廣東牌", s: "Ava +264, Yanyi +80, Haydrian -248, Karis -96"},
            {d: "2026-03-20", t: "港式台牌", s: "Ava +289, Emily -98, Joey -14, Haydrian -177"}
        ];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function renderRank() {
            const list = document.getElementById('rankList');
            list.innerHTML = PLAYERS_DATA.sort((a,b) => b.sum - a.sum).map((p, i) => `
                <div class="p-4 flex justify-between items-center ${i < 3 ? 'bg-amber-50' : ''}">
                    <div class="flex items-center gap-4">
                        <span class="text-gray-400 italic font-black w-4">${i+1}</span>
                        <span class="text-2xl">${p.icon}</span>
                        <div>
                            <p class="font-black text-emerald-900 leading-none">${p.name}</p>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">${p.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.sum > 0 ? '+' : ''}${p.sum}</p>
                        <p class="text-[10px] text-gray-400 font-bold">${p.games} 局</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = PLAYERS_DATA.map(p => `
                <div class="tile-card p-4 bg-white flex items-center gap-4">
                    <div class="text-4xl">${p.icon}</div>
                    <div>
                        <h4 class="font-black text-emerald-900">${p.name}</h4>
                        <p class="text-xs font-bold text-gray-500">${p.title}</p>
                        <div class="flex gap-2 mt-1">
                            <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-black">勝率 ${p.winRate}%</span>
                            <span class="text-[10px] bg-gray-100 text-gray-600 px-2 py-0.5 rounded-full font-black">${p.sum >= 0 ? '贏家' : '慈善'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderLogs() {
            const container = document.getElementById('logsContainer');
            const savedLogs = JSON.parse(localStorage.getItem('mj_logs') || "[]");
            const allLogs = [...savedLogs, ...INITIAL_LOGS];

            container.innerHTML = allLogs.map(l => {
                const players = l.s.split(',').map(ps => {
                    const [name, score] = ps.trim().split(' ');
                    const isWin = score.includes('+');
                    return `<span class="score-pill ${isWin ? 'win' : 'lose'}">${name} ${score}</span>`;
                }).join('');

                return `
                    <div class="tile-card p-5 bg-white shadow-sm border-l-8 border-l-emerald-800">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <p class="text-sm font-black text-emerald-900">${l.d}</p>
                                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">${l.t}</p>
                            </div>
                            <span class="text-[10px] font-black text-white bg-emerald-800 px-2 py-1 rounded">已結算</span>
                        </div>
                        <div class="flex flex-wrap gap-2">${players}</div>
                    </div>
                `;
            }).join('');
        }

        function addLog() {
            const date = document.getElementById('inputDate').value;
            const type = document.getElementById('inputType').value;
            const scores = document.getElementById('inputScores').value;

            if(!date || !scores) return alert("請填寫完整日期同分數！");

            const newLog = { d: date, t: type, s: scores };
            const savedLogs = JSON.parse(localStorage.getItem('mj_logs') || "[]");
            savedLogs.unshift(newLog);
            localStorage.setItem('mj_logs', JSON.stringify(savedLogs));
            
            alert("紀錄已成功新增！");
            location.reload();
        }

        window.onload = () => {
            renderRank();
            renderHall();
            renderLogs();
        };
    </script>
</body>
</html>
