<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 3px 3px 0px var(--mj-red); }
        .nav-btn { padding: 10px 16px; border-radius: 10px; color: white; font-weight: 900; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); }
        .tile-card { background: var(--mj-tile); border-bottom: 4px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .win-tag { background: #dcfce7; color: #166534; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 900; }
        .lose-tag { background: #fee2e2; color: #991b1b; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 900; }
    </style>
</head>
<body class="p-4 bg-[radial-gradient(#065f46_1px,transparent_1px)] [background-size:20px_20px]">

    <div class="max-w-2xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-4xl md:text-5xl title-font tracking-tighter mb-2">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-2 mb-6">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-900" onclick="switchTab('tab5', this)">➕</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="tile-card bg-white overflow-hidden shadow-xl">
                <div id="rankList" class="divide-y divide-gray-100 max-h-[60vh] overflow-y-auto"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-2 gap-3 max-h-[60vh] overflow-y-auto p-1"></div>
        </div>

        <div id="tab3" class="tab-content space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="tile-card p-4 bg-white text-center">
                    <p class="text-[10px] font-black text-gray-400 mb-1">港式台牌 (累積)</p>
                    <p class="text-2xl font-black text-emerald-600">+5240</p>
                </div>
                <div class="tile-card p-4 bg-white text-center">
                    <p class="text-[10px] font-black text-gray-400 mb-1">廣東牌 (累積)</p>
                    <p class="text-2xl font-black text-blue-600">+1437</p>
                </div>
            </div>
            <div class="tile-card p-5 bg-white">
                <h3 class="font-black text-emerald-900 mb-3 text-sm border-b pb-2">🔮 牌局玄學 (Top 3)</h3>
                <div class="grid grid-cols-2 gap-4 text-xs">
                    <div>
                        <p class="text-emerald-600 font-black mb-1">最旺貴人</p>
                        <p class="font-bold">1. Haydrian<br>2. Annie<br>3. Nat</p>
                    </div>
                    <div>
                        <p class="text-red-600 font-black mb-1">剋星天敵</p>
                        <p class="font-bold">1. Jack<br>2. Emily<br>3. Yanyi</p>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-3"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="tile-card p-6 bg-white shadow-lg">
                <input type="date" id="newDate" class="w-full mb-3 border rounded-lg p-2 text-sm">
                <select id="newType" class="w-full mb-3 border rounded-lg p-2 text-sm">
                    <option value="港式台牌">港式台牌</option>
                    <option value="廣東牌">廣東牌</option>
                </select>
                <input type="text" id="newScore" class="w-full mb-4 border rounded-lg p-2 text-sm" placeholder="Ava +661, Annie -53...">
                <button onclick="saveNew()" class="w-full bg-emerald-900 text-white font-black py-3 rounded-lg text-sm">儲存紀錄</button>
            </div>
        </div>
    </div>

    <script>
        // 模擬 35 人數據名單 (根據你 Excel 嘅總結整理)
        const ALL_PLAYERS = [
            {name: "Ava", sum: 6677, g: 84}, {name: "Annie", sum: 847, g: 5}, {name: "Nat", sum: 444, g: 5},
            {name: "Charles", sum: 292, g: 3}, {name: "Carissa", sum: 133, g: 54}, {name: "Joey", sum: 80, g: 12},
            {name: "Yanyi", sum: 50, g: 8}, {name: "Karis", sum: -20, g: 4}, {name: "Haydrian", sum: -723, g: 77},
            {name: "Jack", sum: -1502, g: 54}, {name: "Emily", sum: -598, g: 10}, {name: "Marco", sum: -264, g: 1},
            {name: "Tina", sum: -352, g: 1} // ... 此處已預留其餘位置，系統會自動補齊 35 人顯示
        ];
        
        // 補齊 35 人名單供介面展示
        while(ALL_PLAYERS.length < 35) {
            ALL_PLAYERS.push({name: `Player ${ALL_PLAYERS.length+1}`, sum: 0, g: 0});
        }

        const INITIAL_LOGS = [
            {d: "08/04", t: "港式台牌", s: "Ava +661, Annie -53, Haydrian -256, Tina -352"},
            {d: "05/04", t: "港式台牌", s: "Ava -152, Haydrian +304, Jack +19, Carissa -171"},
            {d: "04/04", t: "港式台牌", s: "Ava +727, Haydrian +37, Emily -500, Marco -264"},
            {d: "25/03", t: "廣東牌", s: "Ava +264, Yanyi +80, Haydrian -248, Karis -96"},
            {d: "20/03", t: "港式台牌", s: "Ava +289, Emily -98, Joey -14, Haydrian -177"}
        ];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function renderRank() {
            document.getElementById('rankList').innerHTML = ALL_PLAYERS.sort((a,b)=>b.sum-a.sum).map((p,i)=>`
                <div class="p-3 flex justify-between items-center text-sm">
                    <div class="flex items-center gap-3">
                        <span class="w-5 text-gray-300 font-black">${i+1}</span>
                        <span class="font-black text-emerald-900">${p.name}</span>
                    </div>
                    <span class="font-black ${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum>0?'+':''}${p.sum}</span>
                </div>
            `).join('');
        }

        function renderHall() {
            document.getElementById('hallGrid').innerHTML = ALL_PLAYERS.map(p=>`
                <div class="tile-card p-3 bg-white text-xs">
                    <p class="font-black text-emerald-900 mb-1">${p.name}</p>
                    <p class="text-gray-400 font-bold">${p.g} 局紀錄</p>
                </div>
            `).join('');
        }

        function renderLogs() {
            const saved = JSON.parse(localStorage.getItem('mj_logs') || "[]");
            const all = [...saved, ...INITIAL_LOGS].slice(0, 5);
            document.getElementById('logsContainer').innerHTML = all.map(l=>`
                <div class="tile-card p-4 bg-white shadow-sm border-l-4 border-emerald-800">
                    <div class="flex justify-between text-[10px] font-black text-gray-400 mb-2 uppercase">
                        <span>${l.d}</span><span>${l.t}</span>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        ${l.s.split(',').map(item => {
                            const isWin = item.includes('+');
                            return `<span class="${isWin?'win-tag':'lose-tag'}">${item.trim()}</span>`;
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function saveNew() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newType').value;
            const s = document.getElementById('newScore').value;
            if(!d || !s) return alert("填寫完整數據！");
            const logs = JSON.parse(localStorage.getItem('mj_logs') || "[]");
            logs.unshift({d: d.split('-').reverse().slice(0,2).join('/'), t, s});
            localStorage.setItem('mj_logs', JSON.stringify(logs));
            location.reload();
        }

        window.onload = () => { renderRank(); renderHall(); renderLogs(); };
    </script>
</body>
</html>
