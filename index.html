<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; min-height: 100vh; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-6">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
            <div id="dailyQuote" class="inline-block bg-black/20 text-white/80 px-4 py-2 rounded-full text-sm font-bold italic border border-white/10">
                載入中...
            </div>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10 text-sm">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 管理/新增</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center flex-wrap gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="renderRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2025')">2025</button>
            </div>
            <div class="tile-card bg-white overflow-hidden shadow-xl">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-center">
                <div class="tile-card p-6 bg-white"><p class="text-xs font-black text-gray-400 mb-2">累積總盈虧</p><p class="text-5xl font-black text-emerald-600">+6677</p></div>
                <div class="tile-card p-6 bg-white"><p class="text-xs font-black text-gray-400 mb-2">最高連勝/單局</p><p class="text-4xl font-black text-emerald-600">800</p></div>
                <div class="tile-card p-6 bg-white"><p class="text-xs font-black text-gray-400 mb-2">對局總數</p><p class="text-4xl font-black text-gray-600">84</p></div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-4 max-w-2xl mx-auto"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl mx-auto">
                <div class="tile-card p-8 bg-white shadow-xl">
                    <h3 class="font-black text-emerald-900 mb-6 text-xl flex items-center gap-2">📝 快速新增對局</h3>
                    <div class="space-y-6">
                        <div class="grid grid-cols-2 gap-4">
                            <input type="date" id="newDate" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold">
                            <select id="newType" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold">
                                <option value="tai">港式台牌</option>
                                <option value="hk">廣東牌</option>
                            </select>
                        </div>
                        <div class="bg-emerald-50 p-5 rounded-2xl">
                            <label class="block mb-2 text-xs font-black text-emerald-800 uppercase">玩家得分</label>
                            <div class="flex gap-2 mb-4">
                                <select id="playerSelect" class="flex-1 border-2 border-white rounded-xl p-3 font-bold text-sm"></select>
                                <input type="number" id="playerScore" placeholder="分數" class="w-24 border-2 border-white rounded-xl p-3 font-bold text-sm">
                                <button onclick="addEntry()" class="bg-emerald-800 text-white px-5 rounded-xl font-black">+</button>
                            </div>
                            <div id="entryList" class="flex flex-wrap gap-2"></div>
                        </div>
                        <button onclick="saveFinalRecord()" class="w-full bg-emerald-900 text-white font-black py-4 rounded-xl shadow-lg transition hover:bg-emerald-800">儲存戰績</button>
                    </div>
                </div>

                <div class="tile-card p-8 bg-white shadow-xl">
                    <h3 class="font-black text-emerald-900 mb-6 text-xl flex items-center gap-2">👤 註冊新雀友</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block mb-1 text-gray-400 text-xs font-bold">雀友大名</label>
                            <input type="text" id="newPlayerName" placeholder="例如：大殺四方" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-400 text-xs font-bold">代表圖標 (Emoji)</label>
                            <select id="newPlayerIcon" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold text-xl">
                                <option value="🀄">🀄</option><option value="🔥">🔥</option><option value="🐱">🐱</option>
                                <option value="💰">💰</option><option value="🦊">🦊</option><option value="😎">😎</option>
                                <option value="🎲">🎲</option><option value="🚀">🚀</option>
                            </select>
                        </div>
                        <button onclick="registerPlayer()" class="w-full bg-gray-800 text-white font-black py-4 rounded-xl shadow-lg transition hover:bg-gray-700">正式入會</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 雀神語錄
        const quotes = [
            "打牌唔係睇牌面，係睇心態。", "寧摸絕張，莫摸大沖。", "輸錢皆因贏錢起，記得收手。",
            "今日財神喺你左手邊，試下用左手摸牌。", "對家面色紅潤，小心佢聽緊大牌。", "截胡係人生最痛，請保持微笑。"
        ];

        // 初始數據
        const INITIAL_PLAYERS = [{"name": "Ava", "sum": 6677, "games": 84, "winRate": 57.1, "max": 800, "icon": "👑", "yearly": {"2024": 472, "2025": 3988, "2026": 2217}}, {"name": "Annie", "sum": 847, "games": 5, "winRate": 40.0, "max": 1032, "icon": "🔥", "yearly": {"2024": 384, "2025": 516, "2026": -53}}];

        let tempEntries = [];

        // 初始化或讀取 LocalStorage
        function getPlayers() {
            const saved = localStorage.getItem('mj_players');
            return saved ? JSON.parse(saved) : INITIAL_PLAYERS;
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab2') renderHall();
        }

        // 新增玩家功能
        function registerPlayer() {
            const name = document.getElementById('newPlayerName').value.trim();
            const icon = document.getElementById('newPlayerIcon').value;
            if(!name) return alert("請輸入名號！");

            let players = getPlayers();
            if(players.find(p => p.name === name)) return alert("名號已被佔用！");

            players.push({
                name, icon, sum: 0, games: 0, winRate: 0, max: 0, yearly: {}
            });
            localStorage.setItem('mj_players', JSON.stringify(players));
            alert(`雀友 「${name}」 已入會！`);
            location.reload();
        }

        function renderRank(year) {
            const container = document.getElementById('rankContainer');
            const players = getPlayers();
            let sorted = [...players].map(p => ({
                ...p, displaySum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            })).filter(p => year === 'all' || p.displaySum !== 0).sort((a,b) => b.displaySum - a.displaySum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center bg-white ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-300 italic text-sm">${i+1}</span>
                        <div class="text-2xl">${p.icon}</div>
                        <p class="font-black text-emerald-900">${p.name}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.displaySum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.displaySum > 0 ? '+' : ''}${p.displaySum}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const players = getPlayers();
            const hall = document.getElementById('hallGrid');
            hall.innerHTML = players.sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-6 bg-white flex flex-col items-center text-center">
                    <div class="text-4xl mb-3">${p.icon}</div>
                    <h3 class="text-xl font-black text-emerald-900">${p.name}</h3>
                    <div class="grid grid-cols-2 gap-2 mt-4 text-[11px] font-bold text-gray-500 w-full pt-4 border-t">
                        <div>勝率: ${p.winRate}%</div><div>局數: ${p.games}</div>
                        <div class="${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">總盈虧: ${p.sum}</div><div class="text-emerald-600">最高: ${p.max}</div>
                    </div>
                </div>
            `).join('');
        }

        function addEntry() {
            const p = document.getElementById('playerSelect').value;
            const s = document.getElementById('playerScore').value;
            if(!s) return;
            tempEntries.push(`${p} ${parseInt(s)>=0?'+':''}${parseInt(s)}`);
            renderEntries();
            document.getElementById('playerScore').value = '';
        }

        function renderEntries() {
            const container = document.getElementById('entryList');
            container.innerHTML = tempEntries.map((e, i) => `
                <div class="bg-white px-3 py-1 rounded-lg border font-black text-[10px] flex items-center gap-2">
                    ${e} <span class="text-red-500 cursor-pointer" onclick="tempEntries.splice(${i},1);renderEntries()">×</span>
                </div>
            `).join('');
        }

        function saveFinalRecord() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newType').value;
            if(!d || tempEntries.length === 0) return alert("請填好日期同玩家分數！");
            const records = JSON.parse(localStorage.getItem('mj_logs') || "[]");
            records.unshift({ d, t, s: tempEntries.join(', ') });
            localStorage.setItem('mj_logs', JSON.stringify(records));
            alert("戰績已存入本地！");
            location.reload();
        }

        window.onload = () => {
            // 隨機語錄
            document.getElementById('dailyQuote').innerText = `今日雀神語錄：${quotes[Math.floor(Math.random()*quotes.length)]}`;
            
            const players = getPlayers();
            renderRank('all');

            // 填充玩家選擇清單
            const pSelect = document.getElementById('playerSelect');
            players.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.innerText = p.name; pSelect.appendChild(opt);
            });

            // 渲染流水帳
            const container = document.getElementById('logsContainer');
            const logs = JSON.parse(localStorage.getItem('mj_logs') || "[]");
            container.innerHTML = logs.length ? logs.map(l => `
                <div class="tile-card p-5 bg-white border-l-8 border-l-emerald-800 shadow-sm">
                    <div class="flex justify-between text-[10px] font-black text-gray-400 mb-3"><span>${l.d}</span><span class="uppercase bg-emerald-800 text-white px-2 py-0.5 rounded">${l.t}</span></div>
                    <div class="flex flex-wrap gap-2">${l.s.split(',').map(item => `<span class="score-pill ${item.includes('+')?'win':'lose'}">${item.trim()}</span>`).join('')}</div>
                </div>
            `).join('') : '<p class="text-white/50 text-center">暫無紀錄，快啲開返場龍虎鬥！</p>';
        };
    </script>
</body>
</html>
