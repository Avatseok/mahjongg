<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; --mj-gold: #d4af37; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { border: 2px solid #e5e7eb; border-radius: 8px; padding: 8px; width: 100%; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-sm" onclick="updateRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2025')">2025</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2024')">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2 text-center uppercase text-xs">🀄️ 牌型分析 (累積盈虧)</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="text-center p-4 bg-emerald-50 rounded-xl">
                                <p class="text-[10px] font-black text-emerald-800">港式台牌</p>
                                <p id="tw-profit" class="text-2xl font-black text-emerald-600">+$2217</p>
                            </div>
                            <div class="text-center p-4 bg-slate-50 rounded-xl">
                                <p class="text-[10px] font-black text-slate-800">廣東牌</p>
                                <p id="hk-profit" class="text-2xl font-black text-slate-600">+$0</p>
                            </div>
                        </div>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2 text-center uppercase text-xs">🔮 牌局玄學 (數據分析)</h3>
                        <div class="space-y-4 text-sm font-bold">
                            <div>
                                <p class="text-emerald-600 font-black mb-1">最旺貴人 (同場贏最多)</p>
                                <p>1. Haydrian (+1845) / 2. Annie (+920) / 3. Nat (+640)</p>
                            </div>
                            <div>
                                <p class="text-red-600 font-black mb-1">剋星天敵 (同場輸最多)</p>
                                <p>1. Jack (-1240) / 2. Emily (-855) / 3. Yanyi (-530)</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="tile-card p-10 bg-white flex flex-col justify-center items-center text-center">
                    <p class="text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">Ava 累積總盈虧</p>
                    <p id="ava-total-sum" class="text-8xl font-black text-emerald-600">+6677</p>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="max-w-2xl mx-auto tile-card bg-white overflow-hidden shadow-2xl border-4 border-white">
                <div class="bg-emerald-900 p-4 text-white font-black text-center">最近五場戰績回顧</div>
                <div id="logListCompact" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white">
                <h3 class="text-xl font-black text-emerald-900 mb-6 border-b pb-2 text-center">錄入新戰局</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-black mb-1 block text-gray-400">日期</label>
                        <input type="date" id="new-date">
                    </div>
                    <div>
                        <label class="text-[10px] font-black mb-1 block text-gray-400">玩法</label>
                        <select id="new-type"><option value="tw">港式台牌</option><option value="hk">廣東牌</option></select>
                    </div>
                    <div id="score-inputs" class="space-y-3 pt-4 border-t">
                        <p class="text-[10px] font-black text-gray-400">玩家得分 (請填寫四位玩家)</p>
                        </div>
                    <button onclick="saveNewGame()" class="w-full bg-emerald-900 text-white font-black py-4 rounded-xl mt-4 shadow-lg hover:bg-emerald-800 transition">確認並同步更新</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PLAYERS = ["Ava", "Annie", "Charles", "Nat", "Wadee", "Yanyi", "Lailo", "Karis", "Haydrian", "Tina", "Marco", "Carissa", "Tony", "Irene", "Eva", "Andy", "Winnie", "Jayden", "Bobo", "Kit", "Gut", "Cathy", "Kyros", "Heidi", "Colbert", "Soddy", "Emily", "Don", "Jack", "Sunho", "Harry", "Joe", "Joey", "Stephy", "Onon"];

        // 初始 Excel 數據
        let gameLogs = JSON.parse(localStorage.getItem('mj_logs')) || [
            {d: "2026-04-08", type: "tw", scores: {"Ava": 661, "Haydrian": -200, "Annie": -100, "Tina": -361}},
            {d: "2026-04-05", type: "tw", scores: {"Ava": -152, "Haydrian": -244, "Jack": 212, "Carissa": 184}},
            {d: "2026-04-04", type: "tw", scores: {"Ava": 727, "Haydrian": 100, "Marco": -500, "Emily": -327}},
            {d: "2026-03-25", type: "tw", scores: {"Ava": 264, "Haydrian": -292, "Jack": -112, "Carissa": 140}},
            {d: "2026-03-20", type: "tw", scores: {"Ava": 289, "Haydrian": -296, "Jack": 304, "Emily": -297}}
        ];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab5') initInputRows();
        }

        function calculateStats() {
            let stats = {};
            PLAYERS.forEach(name => {
                stats[name] = { name, sum: 0, games: 0, winRate: 0, max: 0, yearly: {"2024": 0, "2025": 0, "2026": 0} };
            });

            gameLogs.forEach(log => {
                const year = log.d.split('-')[0];
                for (let [name, score] of Object.entries(log.scores)) {
                    if (stats[name]) {
                        stats[name].sum += score;
                        stats[name].games += 1;
                        if (stats[name].yearly[year] !== undefined) stats[name].yearly[year] += score;
                        if (score > stats[name].max) stats[name].max = score;
                    }
                }
            });
            return Object.values(stats);
        }

        function updateRank(year) {
            const data = calculateStats();
            const container = document.getElementById('rankContainer');
            let sorted = data.filter(p => p.games > 0).map(p => ({
                ...p,
                currentSum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            })).sort((a,b) => b.currentSum - a.currentSum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic text-sm">${i+1}</span>
                        <p class="font-black text-emerald-900">${p.name}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.currentSum>=0?'text-emerald-600':'text-red-600'}">${p.currentSum>0?'+':''}${p.currentSum}</p>
                        <p class="text-[10px] text-gray-400 font-bold">${p.games} 場</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const data = calculateStats().filter(p => p.games > 0).sort((a,b) => b.sum - a.sum);
            document.getElementById('hallGrid').innerHTML = data.map(p => `
                <div class="tile-card p-5 bg-white">
                    <h3 class="text-xl font-black text-emerald-900 mb-4">${p.name}</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm font-bold">
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">總盈虧</p><p class="${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</p></div>
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">最高單場</p><p class="text-emerald-600">+${p.max}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function renderLogs() {
            const list = document.getElementById('logListCompact');
            const recent = [...gameLogs].sort((a,b) => b.d.localeCompare(a.d)).slice(0, 5);
            list.innerHTML = recent.map(l => `
                <div class="p-4 flex justify-between items-center bg-white hover:bg-gray-50 transition">
                    <div>
                        <p class="text-[10px] font-black text-slate-400 font-mono mb-1">${l.d} · ${l.type === 'tw' ? '港式台牌' : '廣東牌'}</p>
                        <p class="text-xs font-bold text-slate-700">${Object.keys(l.scores).join(', ')}</p>
                    </div>
                    <div class="text-right font-black ${l.scores['Ava'] >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                        ${l.scores['Ava'] > 0 ? '+' : ''}${l.scores['Ava'] || 0}
                    </div>
                </div>
            `).join('');
        }

        function initInputRows() {
            const container = document.getElementById('score-inputs');
            container.innerHTML = [1,2,3,4].map(i => `
                <div class="flex gap-2">
                    <select class="p-input-name font-bold">
                        <option value="">選擇玩家</option>
                        ${PLAYERS.map(n => `<option value="${n}">${n}</option>`).join('')}
                    </select>
                    <input type="number" class="p-input-score font-bold" placeholder="得分">
                </div>
            `).join('');
        }

        function saveNewGame() {
            const date = document.getElementById('new-date').value;
            const type = document.getElementById('new-type').value;
            const names = document.querySelectorAll('.p-input-name');
            const scores = document.querySelectorAll('.p-input-score');

            if (!date) return alert("請輸入日期！");

            let gameScore = {};
            names.forEach((n, i) => {
                if(n.value) gameScore[n.value] = parseInt(scores[i].value || 0);
            });

            gameLogs.push({ d: date, type, scores: gameScore });
            localStorage.setItem('mj_logs', JSON.stringify(gameLogs));
            alert("戰局已保存！");
            location.reload();
        }

        function renderAvaDashboard() {
            const data = calculateStats();
            const ava = data.find(p => p.name === "Ava");
            document.getElementById('ava-total-sum').innerText = (ava.sum >= 0 ? '+' : '') + ava.sum;
            
            const twTotal = gameLogs.filter(l => l.type === 'tw').reduce((s, l) => s + (l.scores['Ava'] || 0), 0);
            const hkTotal = gameLogs.filter(l => l.type === 'hk').reduce((s, l) => s + (l.scores['Ava'] || 0), 0);
            document.getElementById('tw-profit').innerText = (twTotal >= 0 ? '+' : '') + twTotal;
            document.getElementById('hk-profit').innerText = (hkTotal >= 0 ? '+' : '') + hkTotal;
        }

        window.onload = () => {
            updateRank('all');
            renderHall();
            renderLogs();
            renderAvaDashboard();
        };
    </script>
</body>
</html>
