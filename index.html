<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>麻雀龍虎榜 - Ava 專屬數據看板</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f7f3e9; color: #4a4843; font-family: system-ui, -apple-system, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.9); border: 1px solid #e2ddd0; border-radius: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .nav-tab { cursor: pointer; padding: 0.5rem 1.25rem; border-radius: 0.75rem; transition: 0.3s; font-weight: bold; font-size: 0.875rem; color: #71717a; }
        .nav-tab.active { background: white; color: #18181b; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border: 1px solid #e2ddd0; }
        .page-section { display: none; }
        .page-section.active { display: block; animation: fadeIn 0.3s ease-in; }
        .badge-hk { background: #e0f2fe; color: #0369a1; }
        .badge-tai { background: #fef2f2; color: #991b1b; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-slate-800 text-white flex items-center justify-center rounded-lg font-black text-xl italic">🀄</div>
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tighter">麻雀龍虎榜 <span class="text-[10px] bg-slate-800 text-white px-2 py-0.5 rounded ml-1 font-bold">PRO</span></h1>
                    <p class="text-xs font-bold text-amber-700 tracking-widest uppercase opacity-70">Ava's Legend 2024-2026</p>
                </div>
            </div>
            <nav class="flex gap-1 p-1 bg-gray-200/40 rounded-xl">
                <div class="nav-tab active" id="tab-home" onclick="showPage('home')">龍虎榜</div>
                <div class="nav-tab" id="tab-hall" onclick="showPage('hall')">名人堂</div>
                <div class="nav-tab" id="tab-me" onclick="showPage('me')">個人戰績</div>
                <div class="nav-tab" onclick="alert('新增功能開發中！')">流水帳</div>
            </nav>
        </header>

        <main id="page-home" class="page-section active space-y-6">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                <section class="lg:col-span-4 space-y-6">
                    <div class="glass-card p-6">
                        <h2 class="text-lg font-black mb-4 flex items-center justify-between">🏆 年度排名 <span class="text-[10px] font-normal text-gray-400">All Seasons</span></h2>
                        <div id="leaderboard" class="space-y-3"></div>
                    </div>
                    <div class="glass-card p-6 bg-gradient-to-br from-white to-amber-50">
                        <h2 class="text-lg font-black mb-4 flex items-center gap-2">🔮 牌局玄學</h2>
                        <div class="space-y-4">
                            <div class="p-3 bg-white/60 rounded-xl border border-green-100">
                                <p class="text-[10px] font-black text-green-600 uppercase">✨ 貴人 (旺我)</p>
                                <p class="text-sm font-bold text-slate-700">Annie / Marco</p>
                            </div>
                            <div class="p-3 bg-white/60 rounded-xl border border-red-100">
                                <p class="text-[10px] font-black text-red-600 uppercase">💀 天敵 (剋我)</p>
                                <p class="text-sm font-bold text-slate-700">Jack / Haydrian</p>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="lg:col-span-8 space-y-6">
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        <div class="glass-card p-5 text-center"><p class="text-[10px] font-bold text-gray-400 uppercase">總得分</p><p class="text-2xl font-black text-amber-700">+6677</p></div>
                        <div class="glass-card p-5 text-center"><p class="text-[10px] font-bold text-gray-400 uppercase">對局數</p><p class="text-2xl font-black text-slate-700">86</p></div>
                        <div class="glass-card p-5 text-center"><p class="text-[10px] font-bold text-gray-400 uppercase">勝率</p><p class="text-2xl font-black text-green-600">63%</p></div>
                        <div class="glass-card p-5 text-center"><p class="text-[10px] font-bold text-gray-400 uppercase">2026</p><p class="text-2xl font-black text-slate-700">+2217</p></div>
                    </div>
                    <div class="glass-card p-6">
                        <h2 class="text-lg font-black mb-4">📈 三年度戰力激鬥圖</h2>
                        <div class="h-64"><canvas id="mainChart"></canvas></div>
                    </div>
                </section>
            </div>
        </main>

        <main id="page-hall" class="page-section">
            <div class="glass-card p-12 text-center">
                <div class="text-6xl mb-6">👑</div>
                <h2 class="text-3xl font-black text-slate-800 mb-2">雀館名人堂</h2>
                <p class="text-amber-700 font-bold tracking-widest mb-8">ULTIMATE WINNER: AVA</p>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="p-6 bg-white rounded-2xl border border-beige-100 shadow-sm"><p class="text-xs text-gray-400 mb-1">穩定輸出</p><p class="text-xl font-bold">Annie</p></div>
                    <div class="p-6 bg-white rounded-2xl border border-beige-100 shadow-sm"><p class="text-xs text-gray-400 mb-1">最具威脅</p><p class="text-xl font-bold">Nat</p></div>
                    <div class="p-6 bg-white rounded-2xl border border-beige-100 shadow-sm"><p class="text-xs text-gray-400 mb-1">財神爺</p><p class="text-xl font-bold">Jack</p></div>
                </div>
            </div>
        </main>

        <main id="page-me" class="page-section">
            <div class="glass-card p-6 overflow-hidden">
                <h2 class="text-xl font-black mb-6">📜 2026 近期流水帳</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead>
                            <tr class="text-gray-400 border-b border-beige-100"><th class="pb-4">日期</th><th class="pb-4">牌種</th><th class="pb-4">得分</th><th class="pb-4 text-right">結果</th></tr>
                        </thead>
                        <tbody id="recentHistory" class="divide-y divide-beige-50"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script>
        // Data
        const h2026 = [{d:'8-Apr',t:'tai',s:661},{d:'5-Apr',t:'tai',s:-152},{d:'4-Apr',t:'tai',s:727},{d:'25-Mar',t:'tai',s:264},{d:'20-Mar',t:'hk',s:289},{d:'11-Mar',t:'tai',s:-2},{d:'10-Mar',t:'tai',s:94},{d:'6-Mar',t:'tai',s:-14},{d:'1-Mar',t:'hk',s:84},{d:'31-Jan',t:'tai',s:210},{d:'27-Jan',t:'hk',s:-100},{d:'24-Jan',t:'hk',s:-156},{d:'23-Jan',t:'hk',s:492},{d:'17-Jan',t:'hk',s:-180}];
        const sPrev = [68, 272, 4, -44, 88, 84, -64, -28, 28, 188, 800, 800, -148, 192, 248, 32, 188, 356, 172, -176, -152, 104, 36, 52, 376, -128, -344, 96, -108, -116, -64, -272, -188, -84, -224, 36, 32, 420, 4, 276, 60, 416, 292, 416, 572, 72, 316, 288, 68, -72, -476, -72, -168, -212, -240, -216, 124, -80, -112, 472, -196, -212, 60, 764, 44, -52, -80, 248, -60, -316];
        const timeline = [...sPrev, ...h2026.map(x=>x.s).reverse()];
        const ranks = [{n:"Ava",p:6677},{n:"Annie",p:847},{n:"Nat",p:808},{n:"Marco",p:337},{n:"Jack",p:-1502}];

        function showPage(p) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-'+p).classList.add('active');
            document.getElementById('tab-'+p).classList.add('active');
        }

        window.onload = () => {
            const lb = document.getElementById('leaderboard');
            ranks.forEach((r,i) => lb.innerHTML += `<div class="flex justify-between p-3 rounded-xl bg-white/50 border border-transparent hover:border-beige-200 transition-all"><span class="font-bold text-slate-700">${i+1}. ${r.n}</span><span class="font-mono font-black ${r.p>=0?'text-green-600':'text-red-500'}">${r.p>0?'+':''}${r.p}</span></div>`);

            const rh = document.getElementById('recentHistory');
            h2026.forEach(i => rh.innerHTML += `<tr><td class="py-4 text-xs font-bold text-slate-400">${i.d}</td><td class="py-4"><span class="px-2 py-0.5 rounded text-[10px] font-black uppercase ${i.t==='hk'?'badge-hk':'badge-tai'}">${i.t==='hk'?'廣東':'台牌'}</span></td><td class="py-4 font-black ${i.s>=0?'text-green-600':'text-red-500'}">${i.s>0?'+':''}${i.s}</td><td class="py-4 text-right">${i.s>=0?'🔥':'💸'}</td></tr>`);

            let c = 0; const trend = timeline.map(s => c += s);
            new Chart(document.getElementById('mainChart'), {
                type: 'line',
                data: { labels: timeline.map((_,i)=>i), datasets: [{ data: trend, borderColor: '#b08d57', borderWidth: 3, pointRadius: 0, tension: 0.3, fill: true, backgroundColor: 'rgba(176, 141, 87, 0.05)' }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { grid: { color: '#efede6' } } } }
            });
        };
    </script>
</body>
</html>
