<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🀄 雀王爭霸戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; color: #1f2937; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 20px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .rank-row { border-left: 8px solid transparent; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fffbeb, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f8fafc, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #fff7ed, transparent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-6xl title-font tracking-tighter">🀄 雀王爭霸戰 🀄</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-2 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-6">
                <button class="px-4 py-2 rounded-full bg-emerald-900 text-white font-black text-sm" onclick="filterRank('all')">總排名</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="filterRank('2026')">2026</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="filterRank('2025')">2025</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="filterRank('2024')">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden">
                <div id="rankList" class="divide-y divide-gray-100 max-h-[600px] overflow-y-auto"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 bg-white text-center">
                        <select id="statYear" onchange="updateAva(this.value)" class="mb-4 p-2 border rounded font-black">
                            <option value="all">所有年份</option><option value="2026">2026</option>
                            <option value="2025">2025</option><option value="2024">2024</option>
                        </select>
                        <p class="text-xs font-black text-gray-400">累積損益</p>
                        <p id="avaTotal" class="text-5xl font-black text-emerald-600">+6677</p>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🀄 牌型分析</h3>
                        <div class="space-y-2 font-bold text-sm">
                            <div class="flex justify-between"><span>港式台牌</span><span class="text-emerald-600">+6249</span></div>
                            <div class="flex justify-between"><span>廣東牌</span><span class="text-emerald-600">+428</span></div>
                        </div>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學 (數據)</h3>
                        <div id="mystic" class="text-xs space-y-3 font-bold"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 bg-white h-[500px]">
                    <canvas id="avaLine"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead class="bg-emerald-900 text-white font-black">
                        <tr>
                            <th class="p-3">日期</th><th class="p-3">牌型</th>
                            <th class="p-3">Ava</th><th class="p-3">Haydrian</th>
                            <th class="p-3">Carissa</th><th class="p-3">Jack</th>
                            <th class="p-3">其他玩家</th>
                        </tr>
                    </thead>
                    <tbody id="logList" class="divide-y divide-gray-50 font-bold"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 核心數據 (35位玩家樣本)
        const players = [
            {name: "Ava", sum: 6677, games: 84, wr: 57, max: 800, icon: "👑", title: "雀壇傳奇", y26: 2217, y25: 3988, y24: 472},
            {name: "Haydrian", sum: -723, games: 75, wr: 48, max: 736, icon: "💰", title: "大慈善家", y26: -175, y25: -228, y24: -320},
            {name: "Carissa", sum: 133, games: 54, wr: 48, max: 500, icon: "🐱", title: "穩健大班", y26: -307, y25: 440, y24: 0},
            {name: "Jack", sum: -1502, games: 54, wr: 40, max: 460, icon: "🎲", title: "放水大師", y26: -218, y25: -1284, y24: 0},
            {name: "Annie", sum: 847, games: 5, wr: 40, max: 384, icon: "🔥", title: "快閃高手", y26: -53, y25: 516, y24: 384},
            {name: "Yanyi", sum: -1011, games: 16, wr: 31, max: 196, icon: "🤡", title: "送財童子", y26: -200, y25: -811, y24: 0},
            {name: "Nat", sum: 444, games: 5, wr: 60, max: 668, icon: "🕶️", title: "技術輸出", y26: 404, y25: 0, y24: 40}
            // ... 其餘 28 位玩家
        ];

        const logs = [
            {d: "2026-04-08", t: "港式台牌", ava: 661, hay: -307, car: -136, jack: -218, extra: ""},
            {d: "2026-04-05", t: "港式台牌", ava: -152, hay: 388, car: -432, jack: 196, extra: ""},
            {d: "2026-04-04", t: "港式台牌", ava: 727, hay: -12, car: -255, jack: -460, extra: ""},
            {d: "2026-03-25", t: "港式台牌", ava: 264, hay: -30, car: -196, jack: -38, extra: ""},
            {d: "2025-12-24", t: "廣東牌", ava: 84, hay: -32, car: 0, jack: 0, extra: "Annie: -52"}
        ];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') updateAva('all');
        }

        function filterRank(year) {
            const list = document.getElementById('rankList');
            let sorted = [...players].sort((a,b) => {
                let valA = year === 'all' ? a.sum : a['y' + year.slice(2)] || 0;
                let valB = year === 'all' ? b.sum : b['y' + year.slice(2)] || 0;
                return valB - valA;
            });

            list.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic text-sm">${i+1}</span>
                        <span class="font-black text-emerald-900">${p.name}</span>
                    </div>
                    <p class="font-black ${ (year==='all'?p.sum:p['y'+year.slice(2)]) >=0 ? 'text-emerald-600':'text-red-600'}">
                        ${year==='all' ? p.sum : (p['y'+year.slice(2)] || 0)}
                    </p>
                </div>
            `).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = players.map(p => `
                <div class="tile-card p-4 bg-white text-center">
                    <div class="text-3xl mb-2">${p.icon}</div>
                    <h3 class="font-black text-emerald-900 truncate">${p.name}</h3>
                    <p class="text-[10px] bg-emerald-100 text-emerald-800 rounded px-2 py-0.5 inline-block font-black mb-3">${p.title}</p>
                    <div class="grid grid-cols-2 text-[10px] gap-1 font-bold text-gray-500">
                        <span>勝率: ${p.wr}%</span><span>出席: ${p.games}</span>
                        <span>盈虧: ${p.sum}</span><span>最高: +${p.max}</span>
                    </div>
                </div>
            `).join('');
        }

        function updateAva(year) {
            const sumEl = document.getElementById('avaTotal');
            const mysticEl = document.getElementById('mystic');
            let val = year === 'all' ? 6677 : (year==='2026'?2217 : (year==='2025'?3988 : 472));
            sumEl.innerText = (val > 0 ? '+' : '') + val;
            
            mysticEl.innerHTML = `
                <div><p class="text-emerald-600">最強貴人 (累積收益)</p>
                <p>1. Haydrian (+2204) / 2. Annie (+847)</p></div>
                <div class="mt-2"><p class="text-red-600">頭號天敵 (累積虧損)</p>
                <p>1. Jack (-1502) / 2. Yanyi (-1011)</p></div>
            `;
            renderChart();
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = logs.map(l => `
                <tr class="hover:bg-emerald-50">
                    <td class="p-3 text-gray-400 font-mono">${l.d}</td>
                    <td class="p-3"><span class="bg-gray-100 px-2 py-1 rounded-full text-[10px]">${l.t}</span></td>
                    <td class="p-3 text-emerald-600">${l.ava}</td>
                    <td class="p-3 ${l.hay>=0?'text-emerald-600':'text-red-600'}">${l.hay}</td>
                    <td class="p-3 ${l.car>=0?'text-emerald-600':'text-red-600'}">${l.car}</td>
                    <td class="p-3 ${l.jack>=0?'text-emerald-600':'text-red-600'}">${l.jack}</td>
                    <td class="p-3 text-gray-400 italic">${l.extra}</td>
                </tr>
            `).join('');
        }

        let chart;
        function renderChart() {
            const ctx = document.getElementById('avaLine').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2024年初', '2024尾', '2025中', '2025尾', '2026現時'],
                    datasets: [{ label: '損益走勢', data: [0, 472, 2500, 4460, 6677], borderColor: '#064e3b', fill: true, backgroundColor: 'rgba(6,78,59,0.05)', tension: 0.3 }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        window.onload = () => { filterRank('all'); renderHall(); renderLogs(); };
    </script>
</body>
</html>
