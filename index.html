<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄 雀王爭霸戰 🀄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; --mj-gold: #d4af37; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-6xl title-font tracking-tighter mb-4">🀄 雀王爭霸戰 🀄</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人分析</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">詳細流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新增戰局</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div id="rankContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學 (數據化)</h3>
                        <div class="space-y-4">
                            <div>
                                <p class="text-emerald-600 font-black text-sm mb-1">最旺貴人 (同場平均獲利)</p>
                                <div class="font-bold text-sm">
                                    <p>1. Haydrian <span class="text-emerald-600">(+$420/局)</span></p>
                                    <p>2. Annie <span class="text-emerald-600">(+$315/局)</span></p>
                                </div>
                            </div>
                            <div>
                                <p class="text-red-600 font-black text-sm mb-1">剋星天敵 (同場平均損失)</p>
                                <div class="font-bold text-sm">
                                    <p>1. Jack <span class="text-red-600">(-$280/局)</span></p>
                                    <p>2. Emily <span class="text-red-600">(-$195/局)</span></p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 bg-white h-[500px]">
                    <canvas id="avaLineChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-emerald-900 text-white font-black text-sm">
                        <tr>
                            <th class="p-4">日期</th>
                            <th class="p-4">玩家得分詳情</th>
                        </tr>
                    </thead>
                    <tbody id="fullLogTable" class="divide-y divide-gray-100 font-medium text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-2xl mx-auto tile-card p-8 bg-white">
                <h2 class="text-2xl font-black text-emerald-900 mb-6">錄入新戰局</h2>
                <div class="space-y-4">
                    <input type="date" id="newDate" class="w-full p-3 border rounded-lg font-bold">
                    <textarea id="newScores" placeholder="格式: Ava:200, Jack:-100, Haydrian:-50, Annie:-50" class="w-full p-3 border rounded-lg h-32"></textarea>
                    <button onclick="addNewRecord()" class="w-full bg-emerald-700 text-white p-4 rounded-xl font-black hover:bg-emerald-800">即時更新數據</button>
                    <button onclick="resetData()" class="w-full text-gray-400 text-xs mt-4 underline">重置為初始數據 (清除所有手動輸入)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心玩家數據
        const INITIAL_PLAYERS = [{"name": "Ava", "sum": 6677, "games": 84, "winRate": 57.1, "max": 800, "icon": "👑", "title": "雀壇傳奇"}, {"name": "Annie", "sum": 847, "games": 5, "winRate": 40.0, "max": 1032, "icon": "🔥", "title": "火力全開"}, {"name": "Charles", "sum": 292, "games": 3, "winRate": 100.0, "max": 220, "icon": "💎", "title": "鑽石玩家"}, {"name": "Emily", "sum": -1015, "games": 7, "winRate": 42.9, "max": 192, "icon": "📈", "title": "全場最穩"}, {"name": "Jack", "sum": -1502, "games": 54, "winRate": 40.7, "max": 612, "icon": "🤡", "title": "送財童子"}, {"name": "Haydrian", "sum": -723, "games": 77, "winRate": 48.1, "max": 736, "icon": "💸", "title": "大慈善家"}];

        // 模擬全體玩家詳細流水帳
        const INITIAL_HISTORY = [
            {date: "2026-04-08", details: "Ava:661, Annie:-53, Nat:-300, Jack:-308"},
            {date: "2026-04-05", details: "Ava:-152, Jack:200, Haydrian:-48"},
            {date: "2026-04-04", details: "Ava:727, Emily:-98, Jack:-629"}
        ];

        let players = JSON.parse(localStorage.getItem('mj_players')) || INITIAL_PLAYERS;
        let history = JSON.parse(localStorage.getItem('mj_history')) || INITIAL_HISTORY;

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') renderChart();
            if(id === 'tab1') renderRanks();
            if(id === 'tab4') renderHistory();
        }

        function renderRanks() {
            const container = document.getElementById('rankContainer');
            container.innerHTML = players.sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-4 bg-white flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${p.icon}</span>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[10px] text-gray-400 font-bold">${p.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHistory() {
            const table = document.getElementById('fullLogTable');
            table.innerHTML = history.sort((a,b) => b.date.localeCompare(a.date)).map(h => `
                <tr>
                    <td class="p-4 font-mono text-gray-400 border-r w-32">${h.date}</td>
                    <td class="p-4">
                        <div class="flex flex-wrap gap-2">
                            ${h.details.split(',').map(d => {
                                const val = parseInt(d.split(':')[1]);
                                return `<span class="px-2 py-1 rounded bg-gray-50 border text-xs font-bold ${val>=0?'text-emerald-600':'text-red-600'}">${d}</span>`;
                            }).join('')}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        let chart;
        function renderChart() {
            const ctx = document.getElementById('avaLineChart').getContext('2d');
            if(chart) chart.destroy();

            // 提取 Ava 的累積得分
            let cumulative = 0;
            const data = history.sort((a,b) => a.date.localeCompare(b.date)).map(h => {
                const avaScore = h.details.split(',').find(d => d.includes('Ava:'));
                if(avaScore) cumulative += parseInt(avaScore.split(':')[1]);
                return {x: h.date, y: cumulative};
            });

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.x),
                    datasets: [{
                        label: 'Ava 累積盈虧 (平滑化趨勢)',
                        data: data.map(d => d.y),
                        borderColor: '#064e3b',
                        borderWidth: 4,
                        pointRadius: 4,
                        tension: 0.4, // 令線條 Smooth
                        cubicInterpolationMode: 'monotone',
                        fill: true,
                        backgroundColor: 'rgba(6,78,59,0.1)'
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function addNewRecord() {
            const date = document.getElementById('newDate').value;
            const scoresStr = document.getElementById('newScores').value;
            if(!date || !scoresStr) return alert("請填寫日期同戰績！");

            // 更新歷史紀錄
            history.push({date: date, details: scoresStr});

            // 解析並更新玩家總分
            scoresStr.split(',').forEach(item => {
                const [name, score] = item.split(':').map(s => s.trim());
                const player = players.find(p => p.name.toLowerCase() === name.toLowerCase());
                if(player) {
                    player.sum += parseInt(score);
                    player.games += 1;
                }
            });

            localStorage.setItem('mj_history', JSON.stringify(history));
            localStorage.setItem('mj_players', JSON.stringify(players));
            
            alert("更新成功！數據已即時調整。");
            location.reload(); // 刷新以顯示新數據
        }

        function resetData() {
            if(confirm("確定要重置所有手動輸入的數據嗎？")) {
                localStorage.removeItem('mj_history');
                localStorage.removeItem('mj_players');
                location.reload();
            }
        }

        window.onload = () => {
            renderRanks();
        };
    </script>
</body>
</html>
