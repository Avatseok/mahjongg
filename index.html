<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 20px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 4px 12px; border-radius: 999px; font-size: 11px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-2 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-4 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="renderRank('all')">總排名</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2026')">2026</button>
                <button class="px-4 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2025')">2025</button>
            </div>
            <div class="tile-card bg-white overflow-hidden shadow-xl">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="tile-card p-6 text-center bg-white">
                    <p class="text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">累積總盈虧</p>
                    <p class="text-6xl font-black text-emerald-600">+6677</p>
                </div>
                <div class="md:col-span-2 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                        <div>
                            <p class="text-emerald-600 font-black mb-2">最旺貴人</p>
                            <ul class="font-bold space-y-2">
                                <li class="flex justify-between">1. Haydrian <span class="text-emerald-500">+$2,450</span></li>
                                <li class="flex justify-between">2. Annie <span class="text-emerald-500">+$1,120</span></li>
                                <li class="flex justify-between">3. Nat <span class="text-emerald-500">+$860</span></li>
                            </ul>
                        </div>
                        <div>
                            <p class="text-red-600 font-black mb-2">剋星天敵</p>
                            <ul class="font-bold space-y-2">
                                <li class="flex justify-between">1. Jack <span class="text-red-500">-$1,840</span></li>
                                <li class="flex justify-between">2. Emily <span class="text-red-500">-$920</span></li>
                                <li class="flex justify-between">3. Yanyi <span class="text-red-500">-$750</span></li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-3 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 text-xl">🀄 累積盈虧分析</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-blue-50 p-6 rounded-2xl border-2 border-blue-100 flex justify-between items-center">
                            <span class="font-black text-blue-800 text-lg">廣東牌</span>
                            <span class="text-3xl font-black text-blue-600">+$5,240</span>
                        </div>
                        <div class="bg-emerald-50 p-6 rounded-2xl border-2 border-emerald-100 flex justify-between items-center">
                            <span class="font-black text-emerald-800 text-lg">港式台牌</span>
                            <span class="text-3xl font-black text-emerald-600">+$1,437</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-4 max-w-2xl mx-auto"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white shadow-xl">
                <h3 class="font-black text-emerald-900 mb-6 text-xl text-center">➕ 快速新增對局</h3>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block mb-1 text-xs font-black text-gray-400">日期</label>
                            <input type="date" id="newDate" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold">
                        </div>
                        <div>
                            <label class="block mb-1 text-xs font-black text-gray-400">玩法</label>
                            <select id="newType" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold">
                                <option value="tai">港式台牌 (tai)</option>
                                <option value="hk">廣東牌 (hk)</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-emerald-50 p-4 rounded-2xl">
                        <label class="block mb-2 text-xs font-black text-emerald-800">添加玩家得分</label>
                        <div class="flex gap-2">
                            <select id="playerSelect" class="flex-1 border-2 border-white rounded-xl p-3 font-bold"></select>
                            <input type="number" id="playerScore" placeholder="分數" class="w-24 border-2 border-white rounded-xl p-3 font-bold">
                            <button onclick="addEntry()" class="bg-emerald-800 text-white px-4 rounded-xl font-black">+</button>
                        </div>
                        <div id="entryList" class="mt-4 flex flex-wrap gap-2"></div>
                    </div>

                    <button onclick="saveFinalRecord()" class="w-full bg-emerald-900 text-white font-black py-4 rounded-xl shadow-lg">儲存對局</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 完整數據與稱號更新
        const ALL_PLAYERS = [{"name": "Ava", "sum": 6677, "games": 84, "winRate": 57.1, "max": 800, "icon": "👑", "title": "雀壇傳奇", "yearly": {"2024": 472, "2025": 3988, "2026": 2217}}, {"name": "Annie", "sum": 847, "games": 5, "winRate": 40.0, "max": 1032, "icon": "🔥", "title": "火力全開", "yearly": {"2024": 384, "2025": 516, "2026": -53}}, {"name": "Charles", "sum": 292, "games": 3, "winRate": 100.0, "max": 220, "icon": "💎", "title": "鑽石玩家", "yearly": {"2024": 268, "2025": 0, "2026": 24}}, {"name": "Nat", "sum": 444, "games": 5, "winRate": 60.0, "max": 668, "icon": "🕶️", "title": "冷面笑匠", "yearly": {"2024": 40, "2025": 0, "2026": 404}}, {"name": "Wadee", "sum": -100, "games": 2, "winRate": 0.0, "max": 0, "icon": "🌊", "title": "隨風而去", "yearly": {"2024": -32, "2025": 0, "2026": -68}}, {"name": "Yanyi", "sum": -1011, "games": 13, "winRate": 38.5, "max": 196, "icon": "🎲", "title": "運氣一般", "yearly": {"2024": -40, "2025": 0, "2026": -971}}, {"name": "Lailo", "sum": -256, "games": 1, "winRate": 0.0, "max": 0, "icon": "💀", "title": "遺憾離場", "yearly": {"2024": -256, "2025": 0, "2026": 0}}, {"name": "Karis", "sum": -596, "games": 4, "winRate": 25.0, "max": 188, "icon": "🕊️", "title": "和平主義", "yearly": {"2024": -148, "2025": -352, "2026": -96}}, {"name": "Haydrian", "sum": -723, "games": 77, "winRate": 48.1, "max": 736, "icon": "💸", "title": "大慈善家", "yearly": {"2024": -320, "2025": -228, "2026": -175}}, {"name": "Tina", "sum": -1412, "games": 5, "winRate": 0.0, "max": 0, "icon": "📉", "title": "需要努力", "yearly": {"2024": -368, "2025": -692, "2026": -352}}, {"name": "Marco", "sum": 73, "games": 4, "winRate": 50.0, "max": 364, "icon": "🦁", "title": "實力派", "yearly": {"2024": 0, "2025": 488, "2026": -264}}, {"name": "Carissa", "sum": 133, "games": 54, "winRate": 48.1, "max": 892, "icon": "🐱", "title": "穩健派", "yearly": {"2024": 0, "2025": 440, "2026": -307}}, {"name": "Tony", "sum": 344, "games": 2, "winRate": 100.0, "max": 188, "icon": "💪", "title": "硬漢子", "yearly": {"2024": 0, "2025": 188, "2026": 156}}, {"name": "Irene", "sum": 180, "games": 1, "winRate": 100.0, "max": 180, "icon": "⭐", "title": "閃亮新星", "yearly": {"2024": 0, "2025": 180, "2026": 0}}, {"name": "Eva", "sum": 160, "games": 1, "winRate": 100.0, "max": 160, "icon": "✨", "title": "精準出擊", "yearly": {"2024": 0, "2025": 160, "2026": 0}}, {"name": "Andy", "sum": 120, "games": 1, "winRate": 100.0, "max": 120, "icon": "⚡", "title": "雷霆手", "yearly": {"2024": 0, "2025": 120, "2026": 0}}, {"name": "Winnie", "sum": 32, "games": 1, "winRate": 100.0, "max": 32, "icon": "🎀", "title": "優雅勝出", "yearly": {"2024": 0, "2025": 32, "2026": 0}}, {"name": "Jayden", "sum": 24, "games": 1, "winRate": 100.0, "max": 24, "icon": "🚀", "title": "新秀", "yearly": {"2024": 0, "2025": 24, "2026": 0}}, {"name": "Bobo", "sum": -32, "games": 1, "winRate": 0.0, "max": 0, "icon": "🎈", "title": "重志參與", "yearly": {"2024": 0, "2025": -32, "2026": 0}}, {"name": "Kit", "sum": -112, "games": 2, "winRate": 50.0, "max": 48, "icon": "🔧", "title": "修煉中", "yearly": {"2024": 0, "2025": -112, "2026": 0}}, {"name": "Gut", "sum": -204, "games": 12, "winRate": 50.0, "max": 272, "icon": "🍖", "title": "食家", "yearly": {"2024": 0, "2025": -204, "2026": 0}}, {"name": "Cathy", "sum": -296, "games": 1, "winRate": 0.0, "max": 0, "icon": "☕", "title": "享受過程", "yearly": {"2024": 0, "2025": -296, "2026": 0}}, {"name": "Kyros", "sum": -388, "games": 2, "winRate": 50.0, "max": 112, "icon": "🔍", "title": "觀察者", "yearly": {"2024": 0, "2025": -388, "2026": 0}}, {"name": "Heidi", "sum": -400, "games": 1, "winRate": 0.0, "max": 0, "icon": "🏔️", "title": "高山仰止", "yearly": {"2024": 0, "2025": -400, "2026": 0}}, {"name": "Colbert", "sum": -432, "games": 1, "winRate": 0.0, "max": 0, "icon": "👔", "title": "大方得體", "yearly": {"2024": 0, "2025": -432, "2026": 0}}, {"name": "Soddy", "sum": -564, "games": 2, "winRate": 0.0, "max": 0, "icon": "🥤", "title": "佛系", "yearly": {"2024": 0, "2025": -564, "2026": 0}}, {"name": "Emily", "sum": -1015, "games": 7, "winRate": 42.9, "max": 192, "icon": "🌸", "title": "櫻之舞者", "yearly": {"2024": 0, "2025": -568, "2026": -500}}, {"name": "Don", "sum": -584, "games": 3, "winRate": 33.3, "max": 244, "icon": "🎩", "title": "紳士", "yearly": {"2024": 0, "2025": -584, "2026": 0}}, {"name": "Jack", "sum": -1502, "games": 54, "winRate": 40.7, "max": 612, "icon": "🤡", "title": "送財童子", "yearly": {"2024": 0, "2025": -1284, "2026": -218}}, {"name": "Sunho", "sum": 367, "games": 1, "winRate": 100.0, "max": 367, "icon": "🦁", "title": "一戰成名", "yearly": {"2024": 0, "2025": 0, "2026": 367}}, {"name": "Harry", "sum": 296, "games": 2, "winRate": 50.0, "max": 452, "icon": "🦊", "title": "森林之王", "yearly": {"2024": 0, "2025": 0, "2026": 296}}, {"name": "Joe", "sum": 180, "games": 1, "winRate": 100.0, "max": 180, "icon": "🍀", "title": "幸運星", "yearly": {"2024": 0, "2025": 0, "2026": 180}}, {"name": "Joey", "sum": -14, "games": 1, "winRate": 0.0, "max": 0, "icon": "🐨", "title": "見習生", "yearly": {"2024": 0, "2025": 0, "2026": -14}}, {"name": "Stephy", "sum": -20, "games": 1, "winRate": 0.0, "max": 0, "icon": "👠", "title": "步步為營", "yearly": {"2024": 0, "2025": 0, "2026": -20}}, {"name": "Onon", "sum": -508, "games": 3, "winRate": 33.3, "max": 112, "icon": "🐢", "title": "慢慢來", "yearly": {"2024": 0, "2025": 0, "2026": -508}}];

        let tempEntries = [];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function addEntry() {
            const p = document.getElementById('playerSelect').value;
            const s = document.getElementById('playerScore').value;
            if(!s) return;
            const score = parseInt(s);
            tempEntries.push(`${p} ${score >= 0 ? '+' : ''}${score}`);
            renderEntries();
            document.getElementById('playerScore').value = '';
        }

        function renderEntries() {
            const container = document.getElementById('entryList');
            container.innerHTML = tempEntries.map((e, i) => `
                <div class="bg-white px-3 py-1 rounded-lg border font-bold text-xs flex items-center gap-2 shadow-sm">
                    ${e} <span class="text-red-500 cursor-pointer" onclick="tempEntries.splice(${i},1);renderEntries()">×</span>
                </div>
            `).join('');
        }

        function saveFinalRecord() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newType').value;
            if(!d || tempEntries.length === 0) return alert("請填寫日期並添加玩家分數！");
            
            const records = JSON.parse(localStorage.getItem('mj_final_v3') || "[]");
            records.unshift({ d, t, s: tempEntries.join(', ') });
            localStorage.setItem('mj_final_v3', JSON.stringify(records));
            tempEntries = [];
            alert("對局紀錄已成功儲存！");
            location.reload();
        }

        function renderRank(year) {
            const container = document.getElementById('rankContainer');
            let sorted = [...ALL_PLAYERS].map(p => ({
                ...p, displaySum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            })).filter(p => year === 'all' || p.displaySum !== 0).sort((a,b) => b.displaySum - a.displaySum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="p-4 flex justify-between items-center bg-white border-l-8 ${i<3 ? 'border-emerald-500' : 'border-transparent'}">
                    <div class="flex items-center gap-3">
                        <span class="w-5 text-gray-400 font-black italic text-xs">${i+1}</span>
                        <span class="text-2xl">${p.icon}</span>
                        <div>
                            <p class="font-black text-emerald-900 leading-tight">${p.name}</p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${p.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${p.displaySum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.displaySum > 0 ? '+' : ''}${p.displaySum}</p>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => {
            renderRank('all');
            const pSelect = document.getElementById('playerSelect');
            ALL_PLAYERS.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.innerText = p.name; pSelect.appendChild(opt);
            });
            
            // 名人堂 Render
            const hall = document.getElementById('hallGrid');
            hall.innerHTML = ALL_PLAYERS.sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-5 bg-white">
                    <div class="flex justify-between mb-2">
                        <span class="text-2xl">${p.icon}</span>
                        <span class="text-[9px] bg-emerald-100 text-emerald-800 px-2 py-1 rounded-full font-black uppercase">${p.title}</span>
                    </div>
                    <h3 class="text-lg font-black text-emerald-900">${p.name}</h3>
                    <div class="grid grid-cols-2 gap-y-1 mt-3 text-[10px] font-bold text-gray-400">
                        <div>勝率: ${p.winRate}%</div><div class="text-right">局數: ${p.games}</div>
                        <div class="${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">總分: ${p.sum}</div><div class="text-right text-emerald-600">最高: +${p.max}</div>
                    </div>
                </div>
            `).join('');

            // 流水帳 Render
            const container = document.getElementById('logsContainer');
            const saved = JSON.parse(localStorage.getItem('mj_final_v3') || "[]");
            const initial = [
                {d: "2026-04-08", t: "tai", s: "Ava +661, Annie -53, Haydrian -256, Tina -352"},
                {d: "2026-04-05", t: "tai", s: "Ava -152, Haydrian +304, Jack +19, Carissa -171"}
            ];
            [...saved, ...initial].forEach(l => {
                const row = document.createElement('div');
                row.className = "tile-card p-4 bg-white border-l-4 border-l-emerald-800";
                row.innerHTML = `<div class="flex justify-between text-[10px] font-black text-gray-400 mb-2"><span>${l.d}</span><span>${l.t.toUpperCase()}</span></div>
                                 <div class="flex flex-wrap gap-2">${l.s.split(',').map(item => `<span class="score-pill ${item.includes('+')?'win':'lose'}">${item.trim()}</span>`).join('')}</div>`;
                container.appendChild(row);
            });
        };
    </script>
</body>
</html>
