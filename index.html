<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; --mj-gold: #d4af37; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-6xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-sm" onclick="updateRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2025')">2025</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="updateRank('2024')">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 text-center bg-white">
                        <p class="text-xs font-black text-gray-400 mb-2">累積總盈虧 (Ava)</p>
                        <p id="totalProfitDisplay" class="text-6xl font-black text-emerald-600">+6677</p>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學 (Ava 數據分析)</h3>
                        <div class="space-y-4 text-sm">
                            <div>
                                <p class="text-emerald-600 font-black mb-1">最旺貴人 (同場平均贏最多)</p>
                                <p class="font-bold">1. Haydrian (+2,204) <br>2. Annie (+847) <br>3. Nat (+444)</p>
                            </div>
                            <div>
                                <p class="text-red-600 font-black mb-1">剋星天敵 (同場平均輸最多)</p>
                                <p class="font-bold">1. Jack (-1,502) <br>2. Emily (-1,015) <br>3. Yanyi (-1,011)</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 bg-white h-[500px]">
                    <canvas id="avaLineChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 font-black text-sm border-b">
                        <tr>
                            <th class="p-4">日期</th>
                            <th class="p-4">玩法</th>
                            <th class="p-4">對局戰況 (玩家:得分)</th>
                        </tr>
                    </thead>
                    <tbody id="logList" class="divide-y divide-gray-50 font-bold text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-2xl mx-auto tile-card p-8 bg-white">
                <h3 class="text-2xl font-black mb-6">➕ 錄入新對局</h3>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="date" id="newDate" class="p-3 border-2 rounded-xl font-bold">
                        <select id="newType" class="p-3 border-2 rounded-xl font-bold">
                            <option>港式台牌</option>
                            <option>廣東牌</option>
                        </select>
                    </div>
                    <div id="playerInputs" class="space-y-2">
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="playerName w-2/3 p-3 border-2 rounded-xl bg-gray-50">
                            <input type="number" placeholder="得分" class="playerScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="playerName w-2/3 p-3 border-2 rounded-xl bg-gray-50">
                            <input type="number" placeholder="得分" class="playerScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="playerName w-2/3 p-3 border-2 rounded-xl bg-gray-50">
                            <input type="number" placeholder="得分" class="playerScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家姓名" class="playerName w-2/3 p-3 border-2 rounded-xl bg-gray-50">
                            <input type="number" placeholder="得分" class="playerScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                    </div>
                    <button class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black hover:bg-emerald-800 transition" onclick="saveNewRecord()">💾 儲存並即時更新數據</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化數據 (包含所有玩家)
        let players = [{"name": "Ava", "sum": 6677, "games": 84, "winRate": 57.1, "max": 800, "icon": "👑", "title": "雀壇傳奇", "yearly": {"2024": 472, "2025": 3988, "2026": 2217}}, {"name": "Annie", "sum": 847, "games": 5, "winRate": 40.0, "max": 1032, "icon": "🔥", "title": "火力全開", "yearly": {"2024": 384, "2025": 516, "2026": -53}}, {"name": "Charles", "sum": 292, "games": 3, "winRate": 100.0, "max": 220, "icon": "💎", "title": "鑽石玩家", "yearly": {"2024": 268, "2025": 0, "2026": 24}}, {"name": "Nat", "sum": 444, "games": 5, "winRate": 60.0, "max": 668, "icon": "🕶️", "title": "冷面笑匠", "yearly": {"2024": 40, "2025": 0, "2026": 404}}, {"name": "Wadee", "sum": -100, "games": 2, "winRate": 0.0, "max": 0, "icon": "🌊", "title": "隨風而去", "yearly": {"2024": -32, "2025": 0, "2026": -68}}, {"name": "Yanyi", "sum": -1011, "games": 13, "winRate": 38.5, "max": 196, "icon": "🎲", "title": "運氣一般", "yearly": {"2024": -40, "2025": 0, "2026": -971}}, {"name": "Lailo", "sum": -256, "games": 1, "winRate": 0.0, "max": 0, "icon": "💀", "title": "遺憾離場", "yearly": {"2024": -256, "2025": 0, "2026": 0}}, {"name": "Karis", "sum": -596, "games": 4, "winRate": 25.0, "max": 188, "icon": "🕊️", "title": "和平主義", "yearly": {"2024": -148, "2025": -352, "2026": -96}}, {"name": "Haydrian", "sum": -723, "games": 77, "winRate": 48.1, "max": 736, "icon": "💸", "title": "大慈善家", "yearly": {"2024": -320, "2025": -228, "2026": -175}}, {"name": "Tina", "sum": -1412, "games": 5, "winRate": 0.0, "max": 0, "icon": "📉", "title": "需要努力", "yearly": {"2024": -368, "2025": -692, "2026": -352}}, {"name": "Marco", "sum": 73, "games": 4, "winRate": 50.0, "max": 364, "icon": "🦁", "title": "實力派", "yearly": {"2024": 0, "2025": 488, "2026": -264}}, {"name": "Carissa", "sum": 133, "games": 54, "winRate": 48.1, "max": 892, "icon": "🐱", "title": "穩健派", "yearly": {"2024": 0, "2025": 440, "2026": -307}}, {"name": "Emily", "sum": -1015, "games": 7, "winRate": 42.9, "max": 192, "icon": "🎢", "title": "波幅大師", "yearly": {"2024": 0, "2025": -568, "2026": -500}}, {"name": "Jack", "sum": -1502, "games": 54, "winRate": 40.7, "max": 612, "icon": "🤡", "title": "送財童子", "yearly": {"2024": 0, "2025": -1284, "2026": -218}}];
        
        // 詳細流水帳數據
        let gameLogs = [
            {d: "2026-04-08", t: "港式台牌", details: "Ava:661, Haydrian:-200, Carissa:-300, Jack:-161"},
            {d: "2026-04-05", t: "港式台牌", details: "Ava:-152, Annie:-53, Nat:404, Charles:24"},
            {d: "2026-04-04", t: "港式台牌", details: "Ava:727, Haydrian:-100, Jack:-300, Emily:-327"}
        ];

        let myChart = null;

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') renderChart();
        }

        function updateRank(year) {
            const container = document.getElementById('rankContainer');
            let sorted = [...players].map(p => ({
                ...p,
                currentSum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            }))
            .filter(p => year === 'all' || p.currentSum !== 0)
            .sort((a,b) => b.currentSum - a.currentSum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic">${i+1}</span>
                        <div class="text-2xl">${p.icon}</div>
                        <div><p class="font-black text-emerald-900">${p.name}</p><p class="text-[10px] text-gray-400 uppercase">${p.title}</p></div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.currentSum>=0?'text-emerald-600':'text-red-600'}">${p.currentSum>0?'+':''}${p.currentSum}</p>
                        <p class="text-[10px] text-gray-400">${p.games} 場</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = [...players].sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-5 bg-white">
                    <div class="flex justify-between mb-4">
                        <div class="text-3xl">${p.icon}</div>
                        <span class="bg-emerald-100 text-emerald-800 text-[10px] px-2 py-1 rounded-full font-black self-start">${p.title}</span>
                    </div>
                    <h3 class="text-xl font-black text-emerald-900 mb-4">${p.name}</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">勝率</p><p class="font-bold">${p.winRate}%</p></div>
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">出席次數</p><p class="font-bold">${p.games}</p></div>
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">總盈虧</p><p class="font-bold ${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</p></div>
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">最高單日</p><p class="font-bold text-emerald-600">+${p.max}</p></div>
                    </div>
                </div>
            `).join('');
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = gameLogs.sort((a,b) => b.d.localeCompare(a.d)).map(l => `
                <tr>
                    <td class="p-4 text-gray-400 font-mono">${l.d}</td>
                    <td class="p-4">${l.t}</td>
                    <td class="p-4 text-emerald-900 break-all">${l.details}</td>
                </tr>
            `).join('');
        }

        function renderChart() {
            const ctx = document.getElementById('avaLineChart').getContext('2d');
            if (myChart) myChart.destroy();
            
            // 提取 Ava 的戰績做圖
            let cumulative = 0;
            const avaHistory = gameLogs
                .filter(l => l.details.includes("Ava:"))
                .sort((a,b) => a.d.localeCompare(b.d))
                .map(l => {
                    const match = l.details.match(/Ava:(-?\d+)/);
                    const score = match ? parseInt(match[1]) : 0;
                    cumulative += score;
                    return {x: l.d, y: cumulative};
                });

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: avaHistory.map(d => d.x),
                    datasets: [{
                        label: 'Ava 累積盈虧',
                        data: avaHistory.map(d => d.y),
                        borderColor: '#064e3b',
                        borderWidth: 4,
                        fill: true,
                        backgroundColor: 'rgba(6,78,59,0.05)',
                        tension: 0.4 // 增加平滑度
                    }]
                },
                options: { maintainAspectRatio: false }
            });
            document.getElementById('totalProfitDisplay').innerText = (cumulative >= 0 ? '+' : '') + cumulative;
        }

        // 儲存新紀錄功能
        function saveNewRecord() {
            const date = document.getElementById('newDate').value;
            const type = document.getElementById('newType').value;
            const nameInputs = document.querySelectorAll('.playerName');
            const scoreInputs = document.querySelectorAll('.playerScore');
            
            let detailsArr = [];
            let year = date.split('-')[0];

            for (let i = 0; i < 4; i++) {
                let name = nameInputs[i].value.trim();
                let score = parseInt(scoreInputs[i].value) || 0;
                if (name) {
                    detailsArr.push(`${name}:${score}`);
                    
                    // 即時調整玩家總體數據
                    let p = players.find(p => p.name === name);
                    if (p) {
                        p.sum += score;
                        p.games += 1;
                        if (!p.yearly[year]) p.yearly[year] = 0;
                        p.yearly[year] += score;
                        if (score > p.max) p.max = score;
                    }
                }
            }

            if (detailsArr.length > 0) {
                gameLogs.push({d: date, t: type, details: detailsArr.join(', ')});
                alert('數據已更新！');
                // 重新渲染所有畫面
                updateRank('all');
                renderHall();
                renderLogs();
                // 清空輸入
                scoreInputs.forEach(i => i.value = '');
            }
        }

        window.onload = () => {
            document.getElementById('newDate').valueAsDate = new Date();
            updateRank('all');
            renderHall();
            renderLogs();
        };
    </script>
</body>
</html>
