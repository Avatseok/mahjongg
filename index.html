<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVA MJ LEAGUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        :root {
            --mj-green: #064e3b; /* 深綠枱布色 */
            --mj-tile: #fdfbf7;  /* 象牙白牌色 */
            --mj-red: #b91c1c;   /* 硃砂紅 */
            --mj-accent: #059669; /* 翡翠綠 */
        }

        body { 
            background-color: var(--mj-green); 
            color: #333; 
            font-family: 'Noto Sans TC', sans-serif;
            background-image: radial-gradient(#065f46 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 2px 2px 0px var(--mj-red); }
        
        /* 麻將牌風格卡片 */
        .tile-card { 
            background: var(--mj-tile); 
            border-bottom: 4px solid #ddd; 
            border-right: 4px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .nav-btn { color: rgba(253, 251, 247, 0.7); font-weight: 700; padding: 8px 16px; border-radius: 4px; transition: 0.3s; }
        .nav-btn.active { color: var(--mj-tile); background: rgba(255,255,255,0.1); box-shadow: inset 0 -2px 0 var(--mj-tile); }

        .year-pill { 
            padding: 4px 12px; border-radius: 4px; font-size: 12px; cursor: pointer;
            border: 1px solid var(--mj-tile); color: var(--mj-tile); font-weight: bold;
        }
        .year-pill.active { background: var(--mj-tile); color: var(--mj-green); }

        .page { display: none; }
        .page.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        tr.log-row { background: var(--mj-tile); border-radius: 8px; }
        td { padding: 12px; }
        td:first-child { border-radius: 8px 0 0 8px; }
        td:last-child { border-radius: 0 8px 8px 0; }

        .btn-add { background: var(--mj-red); color: white; padding: 8px 20px; border-radius: 4px; font-weight: 900; box-shadow: 0 4px 0 #7f1d1d; transition: 0.1s; }
        .btn-add:active { transform: translateY(2px); box-shadow: 0 2px 0 #7f1d1d; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-6">
            <div class="text-center md:text-left">
                <h1 class="text-4xl title-font">AVA 雀莊紀錄</h1>
                <p class="text-xs text-emerald-200 opacity-80 mt-1 font-bold">2024 - 2026 ARCHIVE</p>
            </div>
            <nav class="flex gap-1">
                <button class="nav-btn active" onclick="showTab('rank', this)">龍虎榜</button>
                <button class="nav-btn" onclick="showTab('hall', this)">名人堂</button>
                <button class="nav-btn" onclick="showTab('me', this)">個人戰績</button>
                <button class="nav-btn" onclick="showTab('log', this)">流水帳</button>
            </nav>
            <button class="btn-add">新增戰績</button>
        </header>

        <section id="rank" class="page active">
            <div class="flex justify-end gap-2 mb-6">
                <span class="year-pill active" onclick="filterRank('2026', this)">2026</span>
                <span class="year-pill" onclick="filterRank('2025', this)">2025</span>
                <span class="year-pill" onclick="filterRank('2024', this)">2024</span>
            </div>
            <div id="rankList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>

        <section id="hall" class="page">
            <div id="hallList" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </section>

        <section id="me" class="page">
            <div class="flex gap-2 mb-6">
                <span class="year-pill active" onclick="filterMe('2026', this)">2026</span>
                <span class="year-pill" onclick="filterMe('2025', this)">2025</span>
                <span class="year-pill" onclick="filterMe('2024', this)">2024</span>
            </div>
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 text-center">
                        <p class="text-xs text-gray-400 font-bold uppercase">年度總和</p>
                        <p id="meSum" class="text-5xl font-black my-2">--</p>
                        <div id="meSub" class="text-[10px] font-bold text-emerald-600"></div>
                    </div>
                    <div class="tile-card p-6">
                        <h3 class="font-black text-emerald-800 border-b pb-2 mb-4">🔮 牌局玄學</h3>
                        <div id="meSpirit" class="space-y-3"></div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 h-[400px]">
                    <canvas id="meChart"></canvas>
                </div>
            </div>
        </section>

        <section id="log" class="page">
            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr class="text-emerald-100 text-left text-xs uppercase font-bold">
                            <th class="px-4 pb-2">日期</th><th class="px-4 pb-2">類型</th><th class="px-4 pb-2 text-right">得分</th>
                        </tr>
                    </thead>
                    <tbody id="logTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // 真實數據結構 (整合自妳的 Excel)
        const DB = {
            2026: { sum: 2217, games: 14, win: 57, rank: [{"n":"Ava","s":2217},{"n":"Nat","s":404},{"n":"Harry","s":296}], lucky: "Haydrian", nemesis: "Nat" },
            2025: { sum: 3988, games: 64, win: 55, rank: [{"n":"Ava","s":3988},{"n":"Annie","s":516},{"n":"Carissa","s":440}], lucky: "Jack", nemesis: "Don" },
            2024: { sum: 472, games: 6, win: 83, rank: [{"n":"Ava","s":472},{"n":"Annie","s":384},{"n":"Charles","s":268}], lucky: "Yanyi", nemesis: "Haydrian" }
        };

        const LOGS = [
            {d:'2026-04-08', t:'港式台牌', s:661}, {d:'2026-04-05', t:'港式台牌', s:-152},
            {d:'2026-04-04', t:'港式台牌', s:727}, {d:'2025-12-21', t:'港式台牌', s:764}
        ];

        let chart = null;

        function showTab(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'me') filterMe('2026', document.querySelector('#me .year-pill'));
        }

        function filterRank(y, btn) {
            document.querySelectorAll('#rank .year-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const data = DB[y].rank;
            document.getElementById('rankList').innerHTML = data.map((r, i) => `
                <div class="tile-card p-4 flex justify-between items-center">
                    <div>
                        <span class="text-[10px] font-black text-gray-300">#0${i+1}</span>
                        <p class="font-black text-emerald-900">${r.n}</p>
                    </div>
                    <p class="text-xl font-black ${r.s>=0?'text-emerald-600':'text-red-600'}">${r.s>0?'+':''}${r.s}</p>
                </div>
            `).join('');
        }

        function initHall() {
            const hallNames = ["Ava", "Annie", "Carissa", "Nat", "Haydrian", "Jack", "Charles", "Yanyi"];
            document.getElementById('hallList').innerHTML = hallNames.map(n => `
                <div class="tile-card p-4 text-center">
                    <div class="w-12 h-12 bg-emerald-100 rounded-full mx-auto mb-2 flex items-center justify-center font-black text-emerald-800">${n[0]}</div>
                    <p class="font-black text-xs text-gray-800">${n}</p>
                    <p class="text-[9px] text-gray-400 font-bold">雀林高手</p>
                </div>
            `).join('');
        }

        function filterMe(y, btn) {
            document.querySelectorAll('#me .year-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');
            const d = DB[y];
            const sumEl = document.getElementById('meSum');
            sumEl.innerText = (d.sum > 0 ? '+' : '') + d.sum;
            sumEl.className = `text-5xl font-black my-2 ${d.sum >=0 ? 'text-emerald-600' : 'text-red-600'}`;
            document.getElementById('meSub').innerText = `${d.games} 場對賽 / 勝率 ${d.win}%`;
            
            document.getElementById('meSpirit').innerHTML = `
                <div class="flex justify-between text-xs"><b>旺我 (貴人)</b><span class="text-emerald-600 font-bold">${d.lucky}</span></div>
                <div class="flex justify-between text-xs"><b>剋我 (天敵)</b><span class="text-red-600 font-bold">${d.nemesis}</span></div>
            `;
            initChart(y);
        }

        function initChart(y) {
            const ctx = document.getElementById('meChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Q1', 'Q2', 'Q3', 'Q4'],
                    datasets: [{
                        label: '盈虧走勢',
                        data: y == '2026' ? [200, 800, 1500, 2217] : [500, 1200, 3000, 3988],
                        borderColor: '#059669',
                        borderWidth: 4,
                        tension: 0.3,
                        pointBackgroundColor: '#b91c1c'
                    }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function initLogs() {
            document.getElementById('logTable').innerHTML = LOGS.map(l => `
                <tr class="log-row">
                    <td class="font-bold text-gray-500 text-xs">${l.d}</td>
                    <td class="font-black text-emerald-800 text-xs">${l.t}</td>
                    <td class="text-right font-black ${l.s>=0?'text-emerald-600':'text-red-600'}">${l.s>0?'+':''}${l.s}</td>
                </tr>
            `).join('');
        }

        window.onload = () => { 
            filterRank('2026', document.querySelector('#rank .year-pill')); 
            initHall(); 
            initLogs(); 
        };
    </script>
</body>
</html>
