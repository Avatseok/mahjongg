<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雀王爭霸戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); opacity: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        input, select { border: 2px solid #e5e7eb; border-radius: 8px; padding: 8px; font-weight: bold; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-6xl md:text-7xl title-font tracking-tighter">雀王爭霸戰</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="renderRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2025')">2025</button>
            </div>
            <div class="tile-card bg-white overflow-hidden shadow-2xl">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="tile-card p-8 bg-white text-center">
                    <h3 class="font-black text-gray-400 mb-2 uppercase tracking-widest">港式台牌累積</h3>
                    <p id="tw-profit" class="text-5xl font-black text-emerald-600">+$0</p>
                </div>
                <div class="tile-card p-8 bg-white text-center">
                    <h3 class="font-black text-gray-400 mb-2 uppercase tracking-widest">廣東牌累積</h3>
                    <p id="hk-profit" class="text-5xl font-black text-slate-400">+$0</p>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-hidden shadow-xl">
                <div id="logList" class="divide-y"></div>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-2xl mx-auto tile-card p-8 bg-white">
                <h2 class="text-2xl font-black mb-6 text-emerald-900">錄入新戰局</h2>
                <div class="grid grid-cols-1 gap-4">
                    <div class="flex flex-col"><label class="text-xs font-black mb-1">日期</label><input type="date" id="new-date"></div>
                    <div class="flex flex-col"><label class="text-xs font-black mb-1">玩法</label>
                        <select id="new-type"><option value="tw">港式台牌</option><option value="hk">廣東牌</option></select>
                    </div>
                    <hr class="my-2">
                    <div id="score-inputs" class="space-y-3">
                        </div>
                    <button onclick="saveNewRecord()" class="mt-4 bg-emerald-900 text-white font-black py-4 rounded-xl shadow-lg hover:bg-emerald-800 transition">確認存檔</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始 35 位玩家數據 (若 localStorage 有則優先取用)
        const INITIAL_PLAYERS = [
            "Ava", "Annie", "Charles", "Nat", "Wadee", "Yanyi", "Lailo", "Karis", "Haydrian", "Tina", 
            "Marco", "Carissa", "Tony", "Irene", "Eva", "Andy", "Winnie", "Jayden", "Bobo", "Kit", 
            "Gut", "Cathy", "Kyros", "Heidi", "Colbert", "Soddy", "Emily", "Don", "Jack", "Sunho", 
            "Harry", "Joe", "Joey", "Stephy", "Onon"
        ].map(name => ({ name, sum: 0, games: 0, winRate: 0, max: 0, yearly: {"2024":0, "2025":0, "2026":0}, icon: "🀄️" }));

        // 從 LocalStorage 讀取或初始化
        let players = JSON.parse(localStorage.getItem('mj_players')) || INITIAL_PLAYERS;
        let logs = JSON.parse(localStorage.getItem('mj_logs')) || [];

        // 模擬初始數據 (僅第一次)
        if (logs.length === 0) {
            // 這裡可以填入你最後一次給我的那幾筆 Logs 作為底薪
            logs = [
                {d: "2026-04-08", type: "tw", scores: {"Ava": 661, "Haydrian": -200, "Annie": -100, "Tina": -361}},
                {d: "2026-04-04", type: "tw", scores: {"Ava": 727, "Haydrian": 100, "Marco": -500, "Emily": -327}}
            ];
            updateStatsFromLogs();
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab1') renderRank('all');
            if(id === 'tab2') renderHall();
            if(id === 'tab4') renderLogs();
            if(id === 'tab5') prepareInput();
        }

        function updateStatsFromLogs() {
            // 重置玩家數據
            players.forEach(p => { p.sum = 0; p.games = 0; p.yearly = {"2024":0, "2025":0, "2026":0}; });
            
            logs.forEach(log => {
                const year = log.d.split('-')[0];
                for (let name in log.scores) {
                    const p = players.find(player => player.name === name);
                    if (p) {
                        const s = parseInt(log.scores[name]);
                        p.sum += s;
                        p.games += 1;
                        if (p.yearly[year] !== undefined) p.yearly[year] += s;
                        if (s > p.max) p.max = s;
                    }
                }
            });
            localStorage.setItem('mj_players', JSON.stringify(players));
            localStorage.setItem('mj_logs', JSON.stringify(logs));
        }

        function renderRank(year) {
            const container = document.getElementById('rankContainer');
            const sorted = [...players]
                .map(p => ({ ...p, showSum: year === 'all' ? p.sum : (p.yearly[year] || 0) }))
                .filter(p => p.games > 0)
                .sort((a, b) => b.showSum - a.showSum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="p-5 flex justify-between items-center bg-white">
                    <div class="flex items-center gap-4">
                        <span class="font-black text-slate-300 italic w-4">${i+1}</span>
                        <span class="font-black text-slate-800">${p.name}</span>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.showSum>=0?'text-emerald-600':'text-red-600'}">${p.showSum>0?'+':''}${p.showSum}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = players.map(p => `
                <div class="tile-card p-4 bg-white text-sm">
                    <p class="font-black text-emerald-900">${p.name}</p>
                    <div class="flex justify-between text-[10px] mt-2 font-bold text-gray-400 uppercase">
                        <span>總盈虧</span>
                        <span class="${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            const recent = [...logs].sort((a,b) => b.d.localeCompare(a.d)).slice(0, 5);
            list.innerHTML = recent.map(l => `
                <div class="p-4 flex justify-between items-center bg-white">
                    <div>
                        <p class="text-[10px] font-black text-slate-300">${l.d} · ${l.type === 'tw' ? '港式台牌' : '廣東牌'}</p>
                        <p class="text-xs font-bold text-slate-600">${Object.keys(l.scores).join(', ')}</p>
                    </div>
                    <div class="text-right font-black ${l.scores['Ava']>=0?'text-emerald-600':'text-red-600'}">
                        ${l.scores['Ava']>0?'+':''}${l.scores['Ava'] || 0}
                    </div>
                </div>
            `).join('');
        }

        function prepareInput() {
            const container = document.getElementById('score-inputs');
            // 預設四個輸入框，可手動選擇玩家
            container.innerHTML = [1,2,3,4].map(i => `
                <div class="flex gap-2">
                    <select class="w-1/2 player-select">
                        <option value="">選擇玩家</option>
                        ${players.map(p => `<option value="${p.name}">${p.name}</option>`).join('')}
                    </select>
                    <input type="number" class="w-1/2 score-input" placeholder="得分">
                </div>
            `).join('');
        }

        function saveNewRecord() {
            const date = document.getElementById('new-date').value;
            const type = document.getElementById('new-type').value;
            const selects = document.querySelectorAll('.player-select');
            const inputs = document.querySelectorAll('.score-input');
            
            if (!date) return alert("請輸入日期");
            
            let newScores = {};
            selects.forEach((sel, i) => {
                if (sel.value) newScores[sel.value] = parseInt(inputs[i].value || 0);
            });

            logs.push({ d: date, type, scores: newScores });
            updateStatsFromLogs();
            alert("紀錄已存檔！");
            switchTab('tab1', document.querySelector('.nav-btn'));
        }

        window.onload = () => {
            updateStatsFromLogs();
            renderRank('all');
            // 計算個人戰績分項
            const twTotal = logs.filter(l => l.type === 'tw').reduce((sum, l) => sum + (l.scores['Ava'] || 0), 0);
            const hkTotal = logs.filter(l => l.type === 'hk').reduce((sum, l) => sum + (l.scores['Ava'] || 0), 0);
            document.getElementById('tw-profit').innerText = (twTotal >= 0 ? '+' : '') + twTotal;
            document.getElementById('hk-profit').innerText = (hkTotal >= 0 ? '+' : '') + hkTotal;
            document.getElementById('hk-profit').className = `text-5xl font-black ${hkTotal >= 0 ? 'text-emerald-600' : 'text-red-600'}`;
        };
    </script>
</body>
</html>
