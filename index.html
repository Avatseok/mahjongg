<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; --mj-gold: #d4af37; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-6xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-sm" onclick="renderRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="renderRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-sm" onclick="renderRank('2025')">2025</button>
            </div>
            <div class="tile-card bg-white overflow-hidden">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 text-center bg-white">
                        <p class="text-xs font-black text-gray-400 mb-2">Ava 累積總盈虧</p>
                        <p id="avaTotalSum" class="text-6xl font-black text-emerald-600">+0</p>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學</h3>
                        <div class="space-y-4 text-sm">
                            <div>
                                <p class="text-emerald-600 font-black mb-1">最旺貴人 (同場贏最多)</p>
                                <p class="font-bold">1. Haydrian (+$2,204) / 2. Annie (+$847)</p>
                            </div>
                            <div>
                                <p class="text-red-600 font-black mb-1">剋星天敵 (同場輸最多)</p>
                                <p class="font-bold">1. Jack (-$1,502) / 2. Emily (-$1,015)</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 bg-white h-[500px]">
                    <canvas id="avaLineChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 font-black text-sm border-b">
                        <tr>
                            <th class="p-4">日期</th>
                            <th class="p-4">參與玩家及戰績</th>
                        </tr>
                    </thead>
                    <tbody id="logList" class="divide-y divide-gray-50 font-bold text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white">
                <h3 class="text-2xl font-black mb-6 text-emerald-900">📝 輸入新戰局</h3>
                <div class="space-y-4">
                    <input type="date" id="newDate" class="w-full p-3 border-2 rounded-xl font-bold">
                    <div id="playerInputs" class="space-y-3">
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家名字" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家名字" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家名字" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                        <div class="flex gap-2">
                            <input type="text" placeholder="玩家名字" class="pName w-2/3 p-3 border-2 rounded-xl">
                            <input type="number" placeholder="得分" class="pScore w-1/3 p-3 border-2 rounded-xl">
                        </div>
                    </div>
                    <button class="w-full bg-emerald-900 text-white p-4 rounded-xl font-black hover:bg-emerald-800 transition" onclick="addNewRecord()">💾 儲存並即時更新數據</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 初始化數據
        let GAME_DATA = {
            players: [
                {name: "Ava", sum: 6677, games: 84, wins: 48, max: 800, icon: "👑", title: "雀壇傳奇", yearly: {"2026": 2217, "2025": 3988}},
                {name: "Annie", sum: 847, games: 5, wins: 2, max: 1032, icon: "🔥", title: "火力全開", yearly: {"2026": -53, "2025": 516}},
                {name: "Nat", sum: 444, games: 5, wins: 3, max: 668, icon: "🕶️", title: "冷面笑匠", yearly: {"2026": 404, "2025": 0}},
                {name: "Emily", sum: -1015, games: 7, wins: 3, max: 192, icon: "🛡️", title: "逆流戰士", yearly: {"2026": -500, "2025": -568}},
                {name: "Haydrian", sum: -723, games: 77, wins: 37, max: 736, icon: "💸", title: "大慈善家", yearly: {"2026": -175, "2025": -228}},
                {name: "Jack", sum: -1502, games: 54, wins: 22, max: 612, icon: "🤡", title: "送財童子", yearly: {"2026": -218, "2025": -1284}}
            ],
            logs: [
                {d: "2026-04-08", results: [{n: "Ava", s: 661}, {n: "Haydrian", s: -200}, {n: "Jack", s: -461}]},
                {d: "2026-04-04", results: [{n: "Ava", s: 727}, {n: "Nat", s: -300}, {n: "Annie", s: -427}]}
            ]
        };

        let myChart = null;

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') renderAvaChart();
        }

        function renderRank(year) {
            const container = document.getElementById('rankContainer');
            let sorted = [...GAME_DATA.players].sort((a, b) => {
                let valA = year === 'all' ? a.sum : (a.yearly[year] || 0);
                let valB = year === 'all' ? b.sum : (b.yearly[year] || 0);
                return valB - valA;
            });

            container.innerHTML = sorted.map((p, i) => {
                let displaySum = year === 'all' ? p.sum : (p.yearly[year] || 0);
                return `
                <div class="rank-row p-4 flex justify-between items-center ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic">${i+1}</span>
                        <div class="text-2xl">${p.icon}</div>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[10px] text-gray-400 uppercase">${p.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${displaySum>=0?'text-emerald-600':'text-red-600'}">${displaySum>0?'+':''}${displaySum}</p>
                        <p class="text-[10px] text-gray-400">${p.games} 場</p>
                    </div>
                </div>`;
            }).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = GAME_DATA.players.sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-5 bg-white">
                    <div class="flex justify-between mb-4">
                        <div class="text-3xl">${p.icon}</div>
                        <span class="bg-emerald-100 text-emerald-800 text-[10px] px-2 py-1 rounded-full font-black">${p.title}</span>
                    </div>
                    <h3 class="text-xl font-black text-emerald-900 mb-2">${p.name}</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">勝率</p><p class="font-bold">${((p.wins/p.games)*100).toFixed(1)}%</p></div>
                        <div><p class="text-gray-400 text-[10px] font-black uppercase">總盈虧</p><p class="font-bold ${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</p></div>
                    </div>
                </div>`).join('');
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = GAME_DATA.logs.sort((a,b) => b.d.localeCompare(a.d)).map(l => `
                <tr>
                    <td class="p-4 text-gray-400 font-mono">${l.d}</td>
                    <td class="p-4">
                        <div class="flex flex-wrap gap-2">
                            ${l.results.map(r => `<span class="px-2 py-1 rounded bg-gray-100">${r.n}: <b class="${r.s>=0?'text-emerald-600':'text-red-600'}">${r.s > 0 ? '+' : ''}${r.s}</b></span>`).join('')}
                        </div>
                    </td>
                </tr>`).join('');
        }

        function renderAvaChart() {
            const ctx = document.getElementById('avaLineChart').getContext('2d');
            document.getElementById('avaTotalSum').innerText = (GAME_DATA.players.find(p => p.name === "Ava")?.sum || 0);
            
            if (myChart) myChart.destroy();

            let avaScores = GAME_DATA.logs.sort((a,b) => a.d.localeCompare(b.d)).map(l => {
                let res = l.results.find(r => r.n === "Ava");
                return { d: l.d, s: res ? res.s : 0 };
            });

            let cumulative = 0;
            let chartPoints = avaScores.map(score => {
                cumulative += score.s;
                return { x: score.d, y: cumulative };
            });

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartPoints.map(p => p.x),
                    datasets: [{
                        label: 'Ava 累積盈虧',
                        data: chartPoints.map(p => p.y),
                        borderColor: '#064e3b',
                        borderWidth: 4,
                        fill: true,
                        backgroundColor: 'rgba(6,78,59,0.05)',
                        tension: 0.4, // 平滑曲線
                        cubicInterpolationMode: 'monotone'
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function addNewRecord() {
            const date = document.getElementById('newDate').value;
            const names = document.querySelectorAll('.pName');
            const scores = document.querySelectorAll('.pScore');
            
            if(!date) return alert("請選擇日期");

            let results = [];
            names.forEach((n, i) => {
                if(n.value && scores[i].value) {
                    results.push({ n: n.value.trim(), s: parseInt(scores[i].value) });
                }
            });

            if(results.length === 0) return alert("請至少輸入一位玩家戰績");

            // 更新 LOG
            GAME_DATA.logs.push({ d: date, results: results });

            // 更新玩家數據
            results.forEach(res => {
                let p = GAME_DATA.players.find(player => player.name === res.n);
                if(!p) {
                    // 新玩家
                    p = { name: res.n, sum: 0, games: 0, wins: 0, max: 0, icon: "👤", title: "新晉雀友", yearly: {} };
                    GAME_DATA.players.push(p);
                }
                p.sum += res.s;
                p.games += 1;
                if(res.s > 0) p.wins += 1;
                if(res.s > p.max) p.max = res.s;
                
                let year = date.split('-')[0];
                p.yearly[year] = (p.yearly[year] || 0) + res.s;
            });

            // 重新渲染所有畫面
            renderRank('all');
            renderHall();
            renderLogs();
            if(document.getElementById('tab3').classList.contains('active')) renderAvaChart();
            
            alert("數據已即時更新！");
            // 清空輸入
            names.forEach(n => n.value = "");
            scores.forEach(s => s.value = "");
        }

        window.onload = () => {
            document.getElementById('newDate').valueAsDate = new Date();
            renderRank('all');
            renderHall();
            renderLogs();
        };
    </script>
</body>
</html>
