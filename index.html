<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 v7.0 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10 text-sm">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">⚙️ 數據管理</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div id="rankContainer" class="tile-card bg-white overflow-hidden shadow-xl divide-y divide-gray-100"></div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-4 max-w-2xl mx-auto"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
                <div class="tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 text-lg border-b pb-2">👤 註冊新玩家</h3>
                    <div class="flex gap-2">
                        <input type="text" id="newPlayerName" placeholder="玩家名字" class="flex-1 border-2 border-gray-100 rounded-xl p-3 font-bold">
                        <button onclick="addNewPlayer()" class="bg-emerald-800 text-white px-6 rounded-xl font-black transition hover:bg-emerald-700">註冊</button>
                    </div>
                </div>

                <div class="tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 text-lg border-b pb-2">➕ 對局錄入</h3>
                    <div class="space-y-4">
                        <input type="date" id="gameDate" class="w-full border-2 border-gray-100 rounded-xl p-3 font-bold text-sm">
                        <div class="flex gap-2">
                            <select id="playerSelect" class="flex-1 border-2 border-gray-100 rounded-xl p-3 font-bold text-sm"></select>
                            <input type="number" id="gameScore" placeholder="得分" class="w-24 border-2 border-gray-100 rounded-xl p-3 font-bold text-sm">
                            <button onclick="addEntry()" class="bg-emerald-700 text-white px-4 rounded-xl font-black">+</button>
                        </div>
                        <div id="entryList" class="flex flex-wrap gap-2 min-h-[40px] p-3 bg-gray-50 rounded-xl border-2 border-dashed border-gray-200"></div>
                        <button onclick="saveFinalRecord()" class="w-full bg-emerald-900 text-white font-black py-4 rounded-xl shadow-lg transition hover:scale-[1.02]">確認儲存對局</button>
                    </div>
                </div>
                
                <div class="md:col-span-2 text-center pt-4">
                    <button onclick="if(confirm('確定清除所有數據？')) {localStorage.clear(); location.reload();}" class="text-xs font-bold text-red-300 underline opacity-50">重置所有系統數據</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 動態文案池 ---
        const TEXT_POOLS = {
            LEGEND: {
                titles: ["雀壇傳奇", "至尊雀聖", "東方不敗", "職業大亨", "數據統治者"],
                comments: ["具備數據級的統治力，穩定輸出的雀王。", "牌路深不可測，對手眼中的終極大魔王。", "佢嘅存在就係其他玩家嘅壓力，贏錢已經成為習慣。", "基本上只要佢坐低，大家就已經準備緊交學費。"],
                icons: ["👑", "🏆", "🎖️"]
            },
            STAR: {
                titles: ["博弈新星", "爆發之鬼", "逆流戰士", "冷面殺手", "單局破壞神"],
                comments: ["負盈虧但勝率不錯，具備極高單局爆發力。", "牌風激進，隨時可以喺一局之內扭轉乾坤。", "數據顯示佢實力驚人，只係需要一點運氣加持。", "屬於「唔鳴則已，一鳴驚人」嘅危險對手。"],
                icons: ["🔥", "⚡", "✨"]
            },
            SOLID: {
                titles: ["實力派", "穩健大師", "鋼鐵防線", "技術流玩家", "雀壇中堅"],
                comments: ["戰績穩定，能夠在混戰中精確把握贏牌機會。", "防守密不透風，進攻點到即止，非常難對付。", "基本功扎實，係雀壇中流砥柱，極難動搖。", "唔追求大起大落，勝在夠穩，係職業級玩家。"],
                icons: ["🛡️", "🦁", "💎"]
            },
            PHILANTHROPIST: {
                titles: ["大慈善家", "雀壇及時雨", "歡樂送分童子", "派錢之友", "博愛雀友"],
                comments: ["熱心推動雀界發展，是大家最受歡迎的派錢之友。", "雖然最近交緊學費，但佢嘅鬥志依然令大家佩服。", "志不在贏，最重要係大家打得開心，係飯局靈魂。", "牌品好、人品更好，輸錢都依然保持優雅。"],
                icons: ["💸", "🧧", "🕯️"]
            },
            NEWBIE: {
                titles: ["新進雀友", "神秘嘉賓", "雀壇潛力股", "初登場新秀"],
                comments: ["初來報到，期待你未來嘅戰績！", "數據採集不足，隱藏實力嘅危險人物。", "新秀登場，大家要小心佢嘅新手運加成！", "暫時仲觀察緊牌路，係雀壇嘅明日之星。"],
                icons: ["🎲", "🐣", "🆕"]
            }
        };

        // 初始化數據
        let players = JSON.parse(localStorage.getItem('mj_players')) || [
            { name: "Ava", sum: 6677, games: 84, wins: 48, max: 800 },
            { name: "Emily", sum: -1015, games: 7, wins: 3, max: 192 },
            { name: "Jack", sum: -1502, games: 54, wins: 22, max: 612 }
        ];
        let logs = JSON.parse(localStorage.getItem('mj_logs')) || [];

        // --- 核心邏輯：動態生成稱號與點評 (隨機且不重複) ---
        function getDynamicStatus(p) {
            const winRate = p.games > 0 ? ((p.wins / p.games) * 100).toFixed(1) : 0;
            let pool = TEXT_POOLS.NEWBIE;

            if (p.games < 5) pool = TEXT_POOLS.NEWBIE;
            else if (p.sum > 2000) pool = TEXT_POOLS.LEGEND;
            else if (p.sum > 0) pool = TEXT_POOLS.SOLID;
            else if (p.sum < -1000) pool = TEXT_POOLS.PHILANTHROPIST;
            else if (winRate > 40) pool = TEXT_POOLS.STAR;

            // 使用名字長度 + 分數作為種子，確保每個人抽到嘅句子相對固定但唔同
            const seed = p.name.length + Math.abs(p.sum);
            const title = pool.titles[seed % pool.titles.length];
            const comment = pool.comments[seed % pool.comments.length];
            const icon = pool.icons[seed % pool.icons.length];

            return { title, comment, icon, winRate };
        }

        // --- Tab 切換 ---
        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            renderAll();
        }

        // --- 數據操作 ---
        function addNewPlayer() {
            const name = document.getElementById('newPlayerName').value.trim();
            if (!name) return;
            if (players.find(p => p.name === name)) return alert("玩家已存在！");
            players.push({ name, sum: 0, games: 0, wins: 0, max: 0 });
            saveData();
            document.getElementById('newPlayerName').value = "";
            renderAll();
            alert(`✅ 註冊成功：歡迎 ${name}！`);
        }

        let currentEntries = [];
        function addEntry() {
            const name = document.getElementById('playerSelect').value;
            const score = parseInt(document.getElementById('gameScore').value);
            if (isNaN(score)) return alert("請輸入有效分數");
            currentEntries.push({ name, score });
            renderEntriesUI();
            document.getElementById('gameScore').value = "";
        }

        function renderEntriesUI() {
            const container = document.getElementById('entryList');
            container.innerHTML = currentEntries.map((e, i) => `
                <div class="bg-white px-3 py-1 rounded-lg border-2 border-emerald-100 font-black text-[10px] shadow-sm flex items-center">
                    ${e.name} ${e.score >= 0 ? '+' : ''}${e.score}
                    <button class="ml-2 text-red-400 hover:text-red-600" onclick="currentEntries.splice(${i},1);renderEntriesUI()">×</button>
                </div>
            `).join('');
        }

        function saveFinalRecord() {
            const date = document.getElementById('gameDate').value;
            if (!date || currentEntries.length === 0) return alert("請填寫日期並至少加入一位玩家分數！");

            currentEntries.forEach(entry => {
                let p = players.find(x => x.name === entry.name);
                if (p) {
                    p.sum += entry.score;
                    p.games += 1;
                    if (entry.score > 0) p.wins += 1;
                    if (entry.score > p.max) p.max = entry.score;
                }
            });

            const logStr = currentEntries.map(e => `${e.name} ${e.score >= 0 ? '+' : ''}${e.score}`).join(', ');
            logs.unshift({ d: date, s: logStr });

            saveData();
            currentEntries = [];
            document.getElementById('entryList').innerHTML = "";
            renderAll();
            alert("🚀 數據已儲存，稱號及點評已即時更新！");
        }

        function saveData() {
            localStorage.setItem('mj_players', JSON.stringify(players));
            localStorage.setItem('mj_logs', JSON.stringify(logs));
        }

        // --- UI 渲染 ---
        function renderAll() {
            const sorted = [...players].sort((a,b) => b.sum - a.sum);

            // 1. 龍虎榜
            document.getElementById('rankContainer').innerHTML = sorted.map((p, i) => {
                const s = getDynamicStatus(p);
                return `
                <div class="p-4 flex justify-between items-center bg-white border-l-8 ${i===0?'border-yellow-400':i===1?'border-slate-300':i===2?'border-amber-600':'border-transparent'}">
                    <div class="flex items-center gap-4">
                        <span class="w-4 font-black text-gray-300 italic text-xs">${i+1}</span>
                        <div class="text-2xl">${s.icon}</div>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase">${s.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.sum > 0 ? '+' : ''}${p.sum}</p>
                        <p class="text-[9px] text-gray-400 font-bold">${p.games} 局 / 勝率 ${s.winRate}%</p>
                    </div>
                </div>`;
            }).join('');

            // 2. 名人堂
            document.getElementById('hallGrid').innerHTML = sorted.map(p => {
                const s = getDynamicStatus(p);
                return `
                <div class="tile-card p-6 bg-white flex flex-col items-center text-center">
                    <div class="text-4xl mb-3">${s.icon}</div>
                    <span class="text-[10px] bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-black mb-2 block w-fit mx-auto">${s.title}</span>
                    <h3 class="text-xl font-black text-emerald-900">${p.name}</h3>
                    <p class="text-[11px] text-emerald-700 font-bold mt-2 mb-4 italic bg-emerald-50/50 p-3 rounded-lg w-full">"${s.comment}"</p>
                    <div class="grid grid-cols-2 gap-4 mt-auto text-[11px] font-bold text-gray-400 w-full pt-4 border-t border-gray-100">
                        <div class="text-left">勝率: ${s.winRate}%</div><div class="text-right">總局數: ${p.games}</div>
                        <div class="text-left ${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">總盈虧: ${p.sum}</div><div class="text-right text-emerald-600">最高: +${p.max}</div>
                    </div>
                </div>`;
            }).join('');

            // 3. 流水帳
            document.getElementById('logsContainer').innerHTML = logs.map(l => `
                <div class="tile-card p-4 bg-white border-l-8 border-l-emerald-800">
                    <p class="text-[10px] font-black text-gray-400 mb-2">${l.d}</p>
                    <div class="flex flex-wrap gap-2">${l.s.split(',').map(s => `<span class="score-pill ${s.includes('+')?'win':'lose'}">${s.trim()}</span>`).join('')}</div>
                </div>`).join('');

            // 4. 下拉選單
            const pSelect = document.getElementById('playerSelect');
            pSelect.innerHTML = players.sort((a,b) => a.name.localeCompare(b.name))
                                       .map(p => `<option value="${p.name}">${p.name}</option>`).join('');
        }

        window.onload = renderAll;
    </script>
</body>
</html>
