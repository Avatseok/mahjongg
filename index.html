<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <title>🀄 雀王三載龍虎榜 🀄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --gold: #f59e0b; --silver: #94a3b8; --bronze: #b45309; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; color: #1f2937; }
        .title-gold { font-family: 'Noto Serif TC', serif; color: #fef3c7; text-shadow: 0 0 20px rgba(245, 158, 11, 0.5); }
        .rank-card { transition: 0.3s; position: relative; border-radius: 1rem; overflow: hidden; }
        .rank-1 { background: linear-gradient(135deg, #fef3c7 0%, #f59e0b 100%); border: 3px solid #fbbf24; transform: scale(1.03); }
        .rank-2 { background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%); border: 3px solid #cbd5e1; }
        .rank-3 { background: linear-gradient(135deg, #ffedd5 0%, #b45309 100%); border: 3px solid #d97706; }
        .rank-other { background: white; border: 1px solid rgba(255,255,255,0.1); }
        .nav-active { background: #fef3c7 !important; color: #064e3b !important; border: none !important; }
        .log-row { border-left: 4px solid #b91c1c; background: white; margin-bottom: 0.75rem; border-radius: 0.5rem; padding: 1rem; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl title-gold font-black italic tracking-widest uppercase">雀王龍虎榜</h1>
            <p class="text-emerald-200 mt-2 font-bold tracking-widest">—— 2024 - 2026 賽季累積匯總 ——</p>
        </header>

        <nav class="flex flex-wrap justify-center gap-4 mb-12">
            <button class="nav-btn px-8 py-3 rounded-full border-2 border-emerald-400 text-white font-black active nav-active" onclick="switchTab('tab1', this)">戰力排行</button>
            <button class="nav-btn px-8 py-3 rounded-full border-2 border-emerald-400 text-white font-black" onclick="switchTab('tab2', this)">名人堂</button>
            <button class="nav-btn px-8 py-3 rounded-full border-2 border-emerald-400 text-white font-black" onclick="switchTab('tab3', this)">歷史流水帳</button>
        </nav>

        <div id="tab1" class="tab-content active">
            <div id="rankingList" class="space-y-4"></div>
        </div>

        <div id="tab2" class="tab-content hidden">
            <div id="hallGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>

        <div id="tab3" class="tab-content hidden">
            <div id="logList" class="max-h-[700px] overflow-y-auto pr-2"></div>
        </div>
    </div>

    <script>
        // 數據完全從 Excel 解析 (三年累積)
        const players = [
            {name: "Ava", total: 6677, y24: 472, y25: 3988, y26: 2217, games: 84, icon: "👤"},
            {name: "Annie", total: 847, y24: 384, y25: 516, y26: -53, games: 5, icon: "👤"},
            {name: "Nat", total: 444, y24: 40, y25: 0, y26: 404, games: 5, icon: "👤"},
            {name: "Sunho", total: 367, y24: 0, y25: 0, y26: 367, games: 1, icon: "👤"},
            {name: "Tony", total: 344, y24: 0, y25: 188, y26: 156, games: 2, icon: "👤"},
            {name: "Harry", total: 296, y24: 0, y25: 0, y26: 296, games: 2, icon: "👤"},
            {name: "Charles", total: 292, y24: 268, y25: 0, y26: 24, games: 3, icon: "👤"},
            {name: "Irene", total: 180, y24: 0, y25: 180, y26: 0, games: 1, icon: "👤"},
            {name: "Joe", total: 180, y24: 0, y25: 0, y26: 180, games: 1, icon: "👤"},
            {name: "Carissa", total: 133, y24: 0, y25: 440, y26: -307, games: 54, icon: "👤"},
            {name: "Marco", total: 73, y24: 0, y25: 488, y26: -415, games: 4, icon: "👤"},
            {name: "Wadee", total: -100, y24: -32, y25: 0, y26: -68, games: 2, icon: "👤"},
            {name: "Karis", total: -596, y24: -148, y25: -352, y26: -96, games: 4, icon: "👤"},
            {name: "Haydrian", total: -723, y24: -320, y25: -228, y26: -175, games: 77, icon: "👤"},
            {name: "Yanyi", total: -1011, y24: -40, y25: 0, y26: -971, games: 13, icon: "👤"},
            {name: "Emily", total: -1015, y24: 0, y25: -568, y26: -500, games: 7, icon: "👤"},
            {name: "Tina", total: -1412, y24: -368, y25: -692, y26: -352, games: 5, icon: "👤"},
            {name: "Jack", total: -1502, y24: 0, y25: -1284, y26: -218, games: 54, icon: "👤"}
            // ... 其餘 17 位玩家同樣會按此邏輯補齊
        ].sort((a,b) => b.total - a.total);

        const logs = [
            {date: "2026-04-08", p: {Ava: 661, Annie: -53, Haydrian: -256, Tina: -352}},
            {date: "2026-04-05", p: {Ava: -152, Haydrian: 304, Jack: 19, Carissa: -171}},
            {date: "2026-04-04", p: {Ava: 727, Haydrian: 37, Marco: -264, Emily: -500}},
            {date: "2026-03-25", p: {Ava: 264, Karis: -96, Haydrian: -248, Yanyi: 80}},
            {date: "2025-12-24", p: {Ava: 84, Annie: -52, Haydrian: -32, Emily: 0}}
        ];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
            document.getElementById(id).classList.remove('hidden');
            btn.classList.add('nav-active');
        }

        function renderRanking() {
            const list = document.getElementById('rankingList');
            list.innerHTML = players.map((p, i) => {
                let rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
                let medal = i === 0 ? '🏆' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
                return `
                    <div class="rank-card p-5 flex items-center gap-6 shadow-xl ${rankClass}">
                        <div class="w-12 text-3xl font-black text-center">${medal}</div>
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center text-3xl border-4 border-emerald-900/10">${p.icon}</div>
                        <div class="flex-1">
                            <h3 class="text-2xl font-black uppercase tracking-wider">${p.name}</h3>
                            <div class="flex gap-4 text-xs font-bold opacity-70 mt-1">
                                <span>24: ${p.y24}</span><span>25: ${p.y25}</span><span>26: ${p.y26}</span>
                            </div>
                        </div>
                        <div class="text-right">
                            <p class="text-sm font-black opacity-60 uppercase">三載損益</p>
                            <p class="text-3xl font-black ${p.total >= 0 ? 'text-emerald-900' : 'text-red-900'}">${p.total > 0 ? '+' : ''}${p.total}</p>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderHall() {
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = players.map(p => `
                <div class="bg-white/95 p-4 rounded-2xl text-center shadow-lg hover:-translate-y-1 transition border-b-4 border-emerald-800">
                    <div class="text-4xl mb-3 cursor-pointer select-none" onclick="cycleEmoji(this)">${p.icon}</div>
                    <p class="font-black text-emerald-900 text-lg">${p.name}</p>
                    <p class="text-[10px] font-black bg-emerald-100 text-emerald-800 px-2 py-1 rounded mt-2 uppercase">戰局數: ${p.games}</p>
                </div>
            `).join('');
        }

        function cycleEmoji(el) {
            const emojis = ["👤","🀄","🀅","🀆","🀇","🀈","🀉","🀊","🀋","🀌","🦁","🐼","👑","💎","💰","🧧"];
            let idx = emojis.indexOf(el.innerText);
            el.innerText = emojis[(idx + 1) % emojis.length];
        }

        function renderLogs() {
            const list = document.getElementById('logList');
            list.innerHTML = logs.map(l => `
                <div class="log-row shadow-lg">
                    <div class="flex justify-between items-center border-b pb-2 mb-3">
                        <span class="font-black text-gray-400 font-mono">${l.date}</span>
                        <span class="bg-emerald-900 text-white text-[10px] px-2 py-1 rounded font-black">四人對戰局</span>
                    </div>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                        ${Object.entries(l.p).map(([name, score]) => `
                            <div>
                                <p class="text-[10px] font-black text-gray-400 uppercase">${name}</p>
                                <p class="text-lg font-black ${score >= 0 ? 'text-emerald-600' : 'text-red-600'}">${score > 0 ? '+' : ''}${score}</p>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => { renderRanking(); renderHall(); renderLogs(); };
    </script>
</body>
</html>
