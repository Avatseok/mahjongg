        const formatName = (n) => n.trim().toLowerCase().charAt(0).toUpperCase() + n.trim().toLowerCase().slice(1);

       async function init() {
    try {
        const response = await fetch(URL);
        const csvText = await response.text();
        const rows = csvText.split(/\r?\n/).filter(r => r.trim() !== '');
        
        rawData = rows.slice(1).map(row => {
            const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
            return { date: cols[0], type: cols[1], scores: cols[2], year: cols[0] ? cols[0].split('-')[0] : "" };
        }).reverse();

        processData();

        // --- 同步所有選單 (流水帳選單 + 個人戰績選單) ---

            logSelect.innerHTML = '<option value="all">所有玩家 (All)</option>';
            players.forEach(name => {
                logSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        // 填充個人戰績選單
        if (personalSelect) {
            personalSelect.innerHTML = ''; // 清空舊嘅
            players.forEach(name => {
                personalSelect.innerHTML += `<option value="${name}">${name}</option>`;
            });
        }

        renderAll();
        document.getElementById('status').innerText = "✅ DATA SYNCHRONIZED";
    } catch (err) {
        document.getElementById('status').innerText = "❌ LOAD FAILED";
        console.error(err);
    }
}


 function processData() {
    playerStats = {};
    const sortedData = [...rawData].sort((a, b) => new Date(a.date) - new Date(b.date));

    sortedData.forEach(match => {
        const segments = match.scores.split(';');
        const matchSummary = segments.map(seg => {
            const parts = seg.trim().match(/^(.+?)\s+([+-]?\d+)$/);
            return parts ? { name: formatName(parts[1]), score: parseInt(parts[2]) } : null;
        }).filter(x => x);

        matchSummary.forEach(me => {
            if (!playerStats[me.name]) {
                playerStats[me.name] = { 
                    total: 0, games: 0, wins: 0, maxWin: 0, 
                    maxStreak: 0, currentStreak: 0,
                    yearly: {}, typeBreakdown: { 'hk': 0, 'tai': 0 }, 
                    buddies: {} 
                };
            }

            const p = playerStats[me.name];
            p.total += me.score;
            p.games += 1;

            if (me.score > 0) {
                p.wins += 1;
                p.currentStreak++;
                if (p.currentStreak > p.maxStreak) p.maxStreak = p.currentStreak;
            } else { p.currentStreak = 0; }
            
            if (me.score > p.maxWin) p.maxWin = me.score;
            if (!p.yearly[match.year]) p.yearly[match.year] = { score: 0, games: 0 };
            p.yearly[match.year].score += me.score;
            p.yearly[match.year].games += 1;
            p.typeBreakdown[match.type.toLowerCase()] = (p.typeBreakdown[match.type.toLowerCase()] || 0) + me.score;

            // --- 精確錢包流向計法 ---
            matchSummary.forEach(other => {
                if (me.name === other.name) return;
                // 將輸贏金額平分給場上其餘 3 人，模擬「從誰手上得到/送給誰」
                let share = me.score / (matchSummary.length - 1);
                p.buddies[other.name] = (p.buddies[other.name] || 0) + share;
            });
        });
    });
}

       function renderRankTable(year) {
            const container = document.getElementById('rankContainer');
            const sorted = Object.keys(playerStats).map(name => {
                let val, games;
                if (year === 'all') {
                    val = playerStats[name].total;
                    games = playerStats[name].games;
                } else {
                    const yearlyData = playerStats[name].yearly[year] || { score: 0, games: 0 };
                    val = yearlyData.score;
                    games = yearlyData.games;
                }
                return { name, val, games };
            }).filter(p => p.val !== 0).sort((a,b) => b.val - a.val);

            container.innerHTML = sorted.map((p, i) => {
                // 喺呢度攞返對應嘅 Emoji 同稱號

                        </p>

        }

                        <span class="text-[11px] font-bold text-red-900">${topNemesis[0]} <span class="text-red-500 ml-1">($${Math.round(topNemesis[1])})</span></span>
                    </div>
                </div>
            </div>
        `;
    }).join('');
}
       function renderLogs() {
    const container = document.getElementById('logsContainer');
    const filterSelect = document.getElementById('logPlayerFilter');
    const filterPlayer = filterSelect ? filterSelect.value : 'all';
    
    // 如果有篩選，就顯示所有相關紀錄；否則只顯示最近 20 條
    const dataToRender = filterPlayer === 'all' ? rawData.slice(0, 20) : rawData.filter(l => l.scores.includes(filterPlayer));

    container.innerHTML = dataToRender.map(l => {
        const isHK = l.type.toLowerCase() === 'hk';
        const scoresHtml = l.scores.split(';').map(s => {
            const isHighlight = filterPlayer !== 'all' && s.includes(filterPlayer);
            const scoreNum = parseInt(s.match(/[+-]?\d+/));
            return `
                <div class="flex justify-between items-center px-3 py-2 rounded-lg ${isHighlight ? 'bg-emerald-100 ring-2 ring-emerald-500' : 'bg-gray-50'}">
                    <span class="text-[11px] font-bold ${isHighlight ? 'text-emerald-900' : 'text-gray-600'}">${s.trim().split(' ')[0]}</span>
                    <span class="text-[11px] font-black ${scoreNum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${scoreNum > 0 ? '+' : ''}${scoreNum}</span>
                </div>
            `;
        }).join('');

        return `
            <div class="tile-card p-5 bg-white border-t-4 ${isHK ? 'border-t-blue-500' : 'border-t-amber-500'}">
                <div class="flex justify-between items-start mb-4">
                    <div><span class="text-[10px] font-black text-gray-400 block mb-1">對局日期</span><span class="text-sm font-black text-emerald-900 italic">${l.date}</span></div>
                    <span class="text-[10px] font-black text-white px-3 py-1 rounded-full ${isHK ? 'bg-blue-600' : 'bg-amber-600'} shadow-sm uppercase italic">${isHK ? '🀄 廣東牌' : '🇹🇼 港式台牌'}</span>
                </div>
                <div class="grid grid-cols-2 gap-2">${scoresHtml}</div>
            </div>
        `;
    }).join('');
}
        // 呢段係新加嘅，直接貼喺 script 入面就得
function renderPersonal(targetName) {
    const container = document.getElementById('personalHero');
    const selector = document.getElementById('playerSelector');
    
    // 優先順序：傳入的名字 > 下拉選單選中的名字 > 預設 Ava
    const nameToShow = targetName || (selector ? selector.value : 'Ava');
    const p = playerStats[nameToShow];
    
    if (!p) return;

    // 同步下拉選單的顯示文字
    if (selector) selector.value = nameToShow;
    }

    // 3. 準備數據：排序搵出最強貴人同剋星
    const buddyList = Object.entries(p.buddies || {})
        .sort((a, b) => b[1] - a[1])
        .slice(0, 3);
    const nemesisList = Object.entries(p.buddies || {})
        .sort((a, b) => a[1] - b[1])
        .slice(0, 3);

    // 4. 渲染畫面 (將原本 Ava 換成 ${nameToShow}，加入 Math.round)
    container.innerHTML = `
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="tile-card p-6 text-center bg-white flex flex-col justify-center">
                <p class="text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">累積總盈虧 (${nameToShow})</p>
                <p class="text-6xl font-black ${p.total >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                    ${p.total > 0 ? '+' : ''}${Math.round(p.total)}
                </p>
            </div>
            
            <div class="md:col-span-2 tile-card p-6 bg-white">
                <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">📅 年度戰情</h3>
                <div class="grid grid-cols-3 gap-4">
                    ${['2026', '2025', '2024'].map(yr => `
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <p class="text-[10px] font-bold text-gray-400">${yr} YTD</p>
                            <p class="text-2xl font-black ${(p.yearly[yr]?.score || 0) >= 0 ? 'text-emerald-600' : 'text-red-600'}">
                                ${(p.yearly[yr]?.score || 0) > 0 ? '+' : ''}${Math.round(p.yearly[yr]?.score || 0)}
                            </p>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="md:col-span-2 tile-card p-6 bg-white">
                <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                    <div>
                        <p class="text-emerald-600 font-black mb-2">💎 提款對象 (Top 3)</p>
                        <ul class="font-bold space-y-2 text-xs">
                            ${buddyList.map((b, i) => `<li class="flex justify-between border-b pb-1">${i+1}. ${b[0]} <span class="text-emerald-500">+$${Math.round(b[1])}</span></li>`).join('')}
                        </ul>
                    </div>
                    <div>
                        <p class="text-red-600 font-black mb-2">💀 進貢對象 (Top 3)</p>
                        <ul class="font-bold space-y-2 text-xs">
                            ${nemesisList.map((n, i) => `<li class="flex justify-between border-b pb-1">${i+1}. ${n[0]} <span class="text-red-500">$${Math.round(n[1])}</span></li>`).join('')}
                        </ul>
                    </div>
                </div>
            </div>

            <div class="md:col-span-1 tile-card p-6 bg-white flex flex-col justify-center">
                <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🀄 玩法盈虧</h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg">
                        <span class="text-xs font-black text-blue-800">廣東牌</span>
                        <span class="font-black text-blue-600">${p.typeBreakdown['hk'] > 0 ? '+' : ''}${Math.round(p.typeBreakdown['hk'] || 0)}</span>
                    </div>
                    <div class="flex justify-between items-center bg-emerald-50 p-3 rounded-lg">
                        <span class="text-xs font-black text-emerald-800">港式台牌</span>
                        <span class="font-black text-emerald-600">${p.typeBreakdown['tai'] > 0 ? '+' : ''}${Math.round(p.typeBreakdown['tai'] || 0)}</span>
                    </div>
                </div>
            </div>

            <div class="md:col-span-3 tile-card p-6 bg-white">
                <h3 class="font-black text-emerald-900 mb-4 border-b pb-2 text-center">🏅 生涯成就</h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="bg-amber-50 p-4 rounded-xl text-center">
                        <p class="text-[10px] font-bold text-amber-800">最高連勝</p>
                        <p class="text-3xl font-black text-amber-600">${p.maxStreak || 0} 局</p>
                    </div>
                    <div class="bg-emerald-50 p-4 rounded-xl text-center">
                        <p class="text-[10px] font-bold text-emerald-800">單局最高</p>
                        <p class="text-3xl font-black text-emerald-600">+${Math.round(p.maxWin)}</p>
                    </div>
                    <div class="bg-blue-50 p-4 rounded-xl text-center">
                        <p class="text-[10px] font-bold text-blue-800">總勝率</p>
                        <p class="text-3xl font-black text-blue-600">${((p.wins / p.games) * 100).toFixed(1)}%</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-xl text-center">
                        <p class="text-[10px] font-bold text-gray-800">總對局數</p>
                        <p class="text-3xl font-black text-gray-600">${p.games}</p>
                    </div>
                </div>
            </div>
        </div>
    `;
}
function renderAll() {
            renderRankTable('all');
            renderHall();
            renderLogs();
            renderPersonal('Ava');

}
