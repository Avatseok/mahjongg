<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2024-2026 雀神榜 | 數據大屏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gold-gradient { background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%); }
        .rank-1 { border-left: 4px solid #fbbf24; background: rgba(251, 191, 36, 0.05); }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                    MAHJONG DASHBOARD <span class="text-white text-2xl ml-2">2024-2026</span>
                </h1>
                <p class="text-slate-400 mt-1">數據即時更新：已整合 2024 年度最新增補戰績</p>
            </div>
            <div class="flex gap-3">
                <div class="glass-card px-4 py-2 rounded-xl text-center">
                    <p class="text-xs text-slate-400 uppercase">總對局數</p>
                    <p class="text-xl font-bold text-blue-400" id="total-games-counter">--</p>
                </div>
                <div class="glass-card px-4 py-2 rounded-xl text-center">
                    <p class="text-xs text-slate-400 uppercase">活躍雀友</p>
                    <p class="text-xl font-bold text-emerald-400" id="active-players-counter">--</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card rounded-3xl p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <i class="fas fa-trophy text-yellow-500"></i> 全球總積分榜
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="updateTable('all')" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full transition">總計</button>
                            <button onclick="updateTable('2024')" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full transition">2024</button>
                            <button onclick="updateTable('2025')" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full transition">2025</button>
                            <button onclick="updateTable('2026')" class="text-xs bg-slate-700 hover:bg-slate-600 px-3 py-1 rounded-full transition">2026</button>
                        </div>
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-slate-400 border-b border-slate-700 text-sm">
                                    <th class="pb-3 font-medium">排名</th>
                                    <th class="pb-3 font-medium">玩家</th>
                                    <th class="pb-3 font-medium">稱號</th>
                                    <th class="pb-3 font-medium text-right">勝率</th>
                                    <th class="pb-3 font-medium text-right">總分</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body" class="divide-y divide-slate-800/50">
                                </tbody>
                        </table>
                    </div>
                </div>

                <div class="glass-card rounded-3xl p-6">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-chart-line text-blue-500"></i> 頂尖玩家年度走勢 (累積)
                    </h2>
                    <div class="chart-container">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="glass-card rounded-3xl p-8 relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10">
                        <i class="fas fa-crown text-8xl text-yellow-500 rotate-12"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-20 h-20 rounded-2xl gold-gradient flex items-center justify-center text-4xl shadow-lg shadow-yellow-500/20">
                                👑
                            </div>
                            <div>
                                <h2 class="text-3xl font-black">Ava</h2>
                                <span class="bg-yellow-500/20 text-yellow-500 text-xs px-2 py-0.5 rounded border border-yellow-500/30 font-bold">雀壇傳奇 (MVP)</span>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                                <p class="text-xs text-slate-400 mb-1">三年總戰績</p>
                                <p class="text-2xl font-bold text-white">+7,677</p>
                            </div>
                            <div class="bg-slate-800/50 p-4 rounded-2xl border border-white/5">
                                <p class="text-xs text-slate-400 mb-1">最高單局</p>
                                <p class="text-2xl font-bold text-emerald-400">800</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">關係網分析 (基於 2024 更新)</h3>
                            <div class="space-y-3">
                                <div class="flex items-center justify-between p-3 bg-emerald-500/10 rounded-xl border border-emerald-500/20">
                                    <div class="flex items-center gap-3">
                                        <span class="text-xl">🤝</span>
                                        <div>
                                            <p class="text-xs text-slate-400">招財之友 (最佳拍檔)</p>
                                            <p class="font-bold text-emerald-400" id="nobility-name">--</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-xs text-slate-400">Ava 同場均分</p>
                                        <p class="font-bold text-emerald-400" id="nobility-avg">--</p>
                                    </div>
                                </div>

                                <div class="flex items-center justify-between p-3 bg-rose-500/10 rounded-xl border border-rose-500/20">
                                    <div class="flex items-center gap-3">
                                        <span class="text-xl">⚔️</span>
                                        <div>
                                            <p class="text-xs text-slate-400">宿命之敵 (遇上必跌)</p>
                                            <p class="font-bold text-rose-400" id="enemy-name">--</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-xs text-slate-400">Ava 同場均分</p>
                                        <p class="font-bold text-rose-400" id="enemy-avg">--</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="glass-card rounded-3xl p-6">
                    <h2 class="text-lg font-bold mb-4">近期對局 (2024 Dec)</h2>
                    <div class="space-y-3" id="recent-logs">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 整合 2024 CSV 與現有 2025-2026 的數據
        const ALL_PLAYERS = [
            {"name": "Ava", "sum": 7677, "games": 107, "winRate": 58.2, "max": 800, "icon": "👑", "title": "雀壇傳奇", "comment": "數據級統治力，穩定輸出的雀壇長青樹。", "yearly": {"2024": 1472, "2025": 3988, "2026": 2217}},
            {"name": "Annie", "sum": 587, "games": 7, "winRate": 42.8, "max": 1032, "icon": "🔥", "title": "火力全開", "comment": "單局爆發力驚人，隨時一鋪清袋對手。", "yearly": {"2024": 124, "2025": 516, "2026": -53}},
            {"name": "Yanyi", "sum": 369, "games": 27, "winRate": 40.7, "max": 492, "icon": "🎲", "title": "運氣一般", "comment": "牌運稍欠火候，需要更多技術補足空缺。", "yearly": {"2024": 1340, "2025": 0, "2026": -971}},
            {"name": "Sunho", "sum": 367, "games": 1, "winRate": 100.0, "max": 367, "icon": "🦁", "title": "一戰成名", "comment": "一次亮相即展現極限戰力，期待再戰。", "yearly": {"2024": 0, "2025": 0, "2026": 367}},
            {"name": "Tony", "sum": 344, "games": 2, "winRate": 100.0, "max": 188, "icon": "💪", "title": "硬漢子", "comment": "全勝紀錄保持者，氣勢凌人，不容小覷。", "yearly": {"2024": 0, "2025": 188, "2026": 156}},
            {"name": "Nat", "sum": 324, "games": 9, "winRate": 44.4, "max": 668, "icon": "🕶️", "title": "冷面笑匠", "comment": "高效率贏家，低調中收割全場積分。", "yearly": {"2024": -80, "2025": 0, "2026": 404}},
            {"name": "Harry", "sum": 296, "games": 2, "winRate": 50.0, "max": 452, "icon": "🦊", "title": "森林之王", "comment": "技術全面，在複雜局面中亦能自保。", "yearly": {"2024": 0, "2025": 0, "2026": 296}},
            {"name": "Marco", "sum": 224, "games": 4, "winRate": 50.0, "max": 364, "icon": "🦁", "title": "實力派", "comment": "五五波戰神，能夠在混戰中保住根基。", "yearly": {"2024": 0, "2025": 488, "2026": -264}},
            {"name": "Colbert", "sum": 196, "games": 4, "winRate": 50.0, "max": 568, "icon": "👔", "title": "大方得體", "comment": "輸得起也贏得起，風度翩翩的雀友。", "yearly": {"2024": 628, "2025": -432, "2026": 0}},
            {"name": "Don", "sum": -164, "games": 4, "winRate": 25.0, "max": 244, "icon": "🎩", "title": "紳士", "comment": "牌路多變，正在尋找最適合自己的節奏。", "yearly": {"2024": 420, "2025": -584, "2026": 0}},
            {"name": "Charles", "sum": 52, "games": 6, "winRate": 66.7, "max": 220, "icon": "💎", "title": "鑽石玩家", "comment": "百戰百勝，出手精準的完美主義者。", "yearly": {"2024": 28, "2025": 0, "2026": 24}},
            {"name": "Carissa", "sum": 133, "games": 54, "winRate": 48.1, "max": 892, "icon": "🐱", "title": "穩健派", "comment": "基本功扎實，穩打穩紮的持久戰型玩家。", "yearly": {"2024": 0, "2025": 440, "2026": -307}},
            {"name": "Angus", "sum": 12, "games": 1, "winRate": 100.0, "max": 12, "icon": "🃏", "title": "新進玩家", "comment": "2024年度新加入的實力戰將。", "yearly": {"2024": 12, "2025": 0, "2026": 0}},
            {"name": "Haydrian", "sum": -311, "games": 94, "winRate": 51.1, "max": 736, "icon": "💸", "title": "大慈善家", "comment": "經驗豐富但戰術激進，是大家的派錢之友。", "yearly": {"2024": 92, "2025": -228, "2026": -175}},
            {"name": "Wadee", "sum": -532, "games": 5, "winRate": 0.0, "max": 0, "icon": "🌊", "title": "隨風而去", "comment": "狀態隨風起伏，正在等待上風位的到來。", "yearly": {"2024": -464, "2025": 0, "2026": -68}},
            {"name": "Karis", "sum": -724, "games": 5, "winRate": 20.0, "max": 188, "icon": "🕊️", "title": "和平主義", "comment": "出牌溫和，對局中充滿紳士風度的玩家。", "yearly": {"2024": -276, "2025": -352, "2026": -96}},
            {"name": "Kyros", "sum": -1212, "games": 6, "winRate": 33.3, "max": 112, "icon": "🔍", "title": "觀察者", "comment": "善於觀察對手，只是尚未掌握贏牌密碼。", "yearly": {"2024": -824, "2025": -388, "2026": 0}},
            {"name": "Jack", "sum": -1502, "games": 54, "winRate": 40.7, "max": 612, "icon": "🤡", "title": "送財童子", "comment": "熱心推動雀界發展，對手眼中的福利官。", "yearly": {"2024": 0, "2025": -1284, "2026": -218}},
            {"name": "Tina", "sum": -1984, "games": 9, "winRate": 0.0, "max": 0, "icon": "📉", "title": "需要努力", "comment": "正處於職業生涯低潮，逆境求生中。", "yearly": {"2024": -940, "2025": -692, "2026": -352}}
        ];
        
        const AVA_STATS = {
            nobility: [{ name: "Kyros", avg: 242.0 }, { name: "Colbert", avg: 137.3 }],
            enemies: [{ name: "Wadee", avg: -32.0 }, { name: "Don", avg: -2.0 }],
            recentLogs: [
                {date: '5-Dec', scores: {'Ava': 272, 'Yanyi': -144, 'Haydrian': -176, 'Charles': 48}},
                {date: '6-Dec', scores: {'Ava': 4, 'Annie': 384, 'Haydrian': -20, 'Tina': -368}},
                {date: '21-Dec', scores: {'Ava': -44, 'Yanyi': 56, 'Haydrian': -20, 'Nat': 40, 'Wadee': -32}},
                {date: '23-Dec', scores: {'Ava': 88, 'Yanyi': 80, 'Haydrian': 88, 'Lailo': -256}},
                {date: '24-Dec', scores: {'Ava': 84, 'Yanyi': 196, 'Haydrian': -132, 'Karis': -148}}
            ]
        };

        function updateTable(year) {
            const tbody = document.getElementById('leaderboard-body');
            let sortedPlayers = [...ALL_PLAYERS];
            
            if (year !== 'all') {
                sortedPlayers.sort((a, b) => (b.yearly[year] || 0) - (a.yearly[year] || 0));
            } else {
                sortedPlayers.sort((a, b) => b.sum - a.sum);
            }

            tbody.innerHTML = sortedPlayers.map((p, index) => {
                const displaySum = year === 'all' ? p.sum : (p.yearly[year] || 0);
                const scoreColor = displaySum >= 0 ? 'text-emerald-400' : 'text-rose-400';
                return `
                    <tr class="group hover:bg-slate-700/30 transition-colors ${index === 0 ? 'rank-1' : ''}">
                        <td class="py-4 pl-2 font-bold text-slate-500">#${index + 1}</td>
                        <td class="py-4">
                            <div class="flex items-center gap-3">
                                <span class="text-2xl">${p.icon}</span>
                                <div>
                                    <p class="font-bold text-slate-100">${p.name}</p>
                                    <p class="text-[10px] text-slate-500 uppercase font-bold">${p.comment.substring(0, 15)}...</p>
                                </div>
                            </div>
                        </td>
                        <td class="py-4">
                            <span class="text-xs bg-slate-800 px-2 py-1 rounded text-slate-300 border border-slate-700">${p.title}</span>
                        </td>
                        <td class="py-4 text-right text-sm font-medium text-slate-400">${p.winRate}%</td>
                        <td class="py-4 text-right font-black ${scoreColor}">${displaySum.toLocaleString()}</td>
                    </tr>
                `;
            }).join('');
        }

        function initCharts() {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const top5 = ALL_PLAYERS.slice(0, 5);
            
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['2024 起點', '2024 年末', '2025 年末', '2026 年末'],
                    datasets: top5.map((p, i) => ({
                        label: p.name,
                        data: [0, p.yearly['2024'], p.yearly['2024'] + p.yearly['2025'], p.sum],
                        borderColor: ['#fbbf24', '#60a5fa', '#34d399', '#f87171', '#a78bfa'][i],
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 4
                    }))
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 10 } } } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });
        }

        // 初始化統計數值
        document.getElementById('total-games-counter').innerText = ALL_PLAYERS.reduce((a, b) => a + b.games, 0);
        document.getElementById('active-players-counter').innerText = ALL_PLAYERS.length;
        document.getElementById('nobility-name').innerText = AVA_STATS.nobility[0].name;
        document.getElementById('nobility-avg').innerText = `+${AVA_STATS.nobility[0].avg}`;
        document.getElementById('enemy-name').innerText = AVA_STATS.enemies[0].name;
        document.getElementById('enemy-avg').innerText = AVA_STATS.enemies[0].avg;

        const logsDiv = document.getElementById('recent-logs');
        logsDiv.innerHTML = AVA_STATS.recentLogs.map(log => `
            <div class="flex justify-between items-center p-3 bg-slate-800/30 rounded-xl border border-slate-700/50">
                <div class="flex items-center gap-3">
                    <span class="text-xs font-bold text-slate-500 w-10">${log.date}</span>
                    <div class="flex -space-x-2">
                        ${Object.keys(log.scores).slice(0, 3).map(n => `<div class="w-6 h-6 rounded-full bg-slate-700 border border-slate-900 flex items-center justify-center text-[8px] font-bold">${n[0]}</div>`).join('')}
                    </div>
                </div>
                <div class="text-right">
                    <span class="text-sm font-bold ${log.scores.Ava >= 0 ? 'text-emerald-400' : 'text-rose-400'}">
                        ${log.scores.Ava >= 0 ? '+' : ''}${log.scores.Ava}
                    </span>
                </div>
            </div>
        `).join('');

        updateTable('all');
        initCharts();
    </script>
</body>
</html>
