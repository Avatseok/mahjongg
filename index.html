<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .score-pill { padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 900; }
        .win { background: #dcfce7; color: #166534; }
        .lose { background: #fee2e2; color: #991b1b; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
        .rank-2 { border-left-color: #94a3b8; background: linear-gradient(90deg, #f1f5f9, transparent); }
        .rank-3 { border-left-color: #d97706; background: linear-gradient(90deg, #ffedd5, transparent); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10 text-sm">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">流水帳</div>
            <div class="nav-btn bg-red-800" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center flex-wrap gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="renderRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2025')">2025</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="renderRank('2024')">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden shadow-xl">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="tile-card p-6 text-center bg-white flex flex-col justify-center">
                    <p class="text-xs font-black text-gray-400 mb-2 uppercase tracking-widest">累積總盈虧 (TOTAL)</p>
                    <p class="text-6xl font-black text-emerald-600">+6677</p>
                </div>
                
                <div class="md:col-span-2 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">📅 年度戰情</h3>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <p class="text-[10px] font-bold text-gray-400">2026 YTD</p>
                            <p class="text-2xl font-black text-emerald-600">+2217</p>
                        </div>
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <p class="text-[10px] font-bold text-gray-400">2025</p>
                            <p class="text-2xl font-black text-emerald-600">+3988</p>
                        </div>
                        <div class="text-center p-4 bg-gray-50 rounded-xl">
                            <p class="text-[10px] font-bold text-gray-400">2024</p>
                            <p class="text-2xl font-black text-emerald-600">+472</p>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-2 tile-card p-6 bg-white">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-sm">
                        <div>
                            <p class="text-emerald-600 font-black mb-2">最旺貴人</p>
                            <ul class="font-bold space-y-2 text-xs">
                                <li class="flex justify-between">1. Haydrian <span class="text-emerald-500">+$2,450</span></li>
                                <li class="flex justify-between">2. Annie <span class="text-emerald-500">+$1,120</span></li>
                                <li class="flex justify-between">3. Nat <span class="text-emerald-500">+$860</span></li>
                            </ul>
                        </div>
                        <div>
                            <p class="text-red-600 font-black mb-2">剋星天敵</p>
                            <ul class="font-bold space-y-2 text-xs">
                                <li class="flex justify-between">1. Jack <span class="text-red-500">-$1,840</span></li>
                                <li class="flex justify-between">2. Emily <span class="text-red-500">-$920</span></li>
                                <li class="flex justify-between">3. Yanyi <span class="text-red-500">-$750</span></li>
                            </ul>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-1 tile-card p-6 bg-white flex flex-col justify-center">
                    <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🀄 玩法盈虧</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center bg-blue-50 p-3 rounded-lg">
                            <span class="text-xs font-black text-blue-800">廣東牌</span>
                            <span class="font-black text-blue-600">+$5,240</span>
                        </div>
                        <div class="flex justify-between items-center bg-emerald-50 p-3 rounded-lg">
                            <span class="text-xs font-black text-emerald-800">港式台牌</span>
                            <span class="font-black text-emerald-600">+$1,437</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div id="logsContainer" class="space-y-4 max-w-2xl mx-auto"></div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-xl mx-auto tile-card p-8 bg-white shadow-xl">
                <h3 class="font-black text-emerald-900 mb-6 text-xl text-center">➕ 快速新增對局</h3>
                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4 text-sm font-bold">
                        <div>
                            <label class="block mb-1 text-gray-400 text-xs">日期</label>
                            <input type="date" id="newDate" class="w-full border-2 border-gray-100 rounded-xl p-3">
                        </div>
                        <div>
                            <label class="block mb-1 text-gray-400 text-xs">玩法</label>
                            <select id="newType" class="w-full border-2 border-gray-100 rounded-xl p-3">
                                <option value="tai">港式台牌 (tai)</option>
                                <option value="hk">廣東牌 (hk)</option>
                            </select>
                        </div>
                    </div>

                    <div class="bg-emerald-50 p-5 rounded-2xl">
                        <label class="block mb-2 text-xs font-black text-emerald-800">添加玩家得分</label>
                        <div class="flex gap-2 mb-4">
                            <select id="playerSelect" class="flex-1 border-2 border-white rounded-xl p-3 font-bold text-sm"></select>
                            <input type="number" id="playerScore" placeholder="分數" class="w-24 border-2 border-white rounded-xl p-3 font-bold text-sm">
                            <button onclick="addEntry()" class="bg-emerald-800 text-white px-5 rounded-xl font-black">+</button>
                        </div>
                        <div id="entryList" class="flex flex-wrap gap-2"></div>
                    </div>

                    <button onclick="saveFinalRecord()" class="w-full bg-emerald-900 text-white font-black py-4 rounded-xl shadow-lg transition hover:scale-[1.02]">儲存對局</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ_qNslS5ceeWEfUtrDgWZskGuvBHvg0zzgvIj4UKZCqUOGG2cbZdTYFiLh0bY-FRcH-uLqd0xYJaGr/pub?gid=719393887&single=true&output=csv';
let ALL_PLAYERS = [];
        let tempEntries = [];

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        }

        function renderRank(year) {
            const container = document.getElementById('rankContainer');
            let sorted = [...ALL_PLAYERS].map(p => ({
                ...p, displaySum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            })).filter(p => year === 'all' || p.displaySum !== 0).sort((a,b) => b.displaySum - a.displaySum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center bg-white ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400 italic text-sm">${i+1}</span>
                        <div class="text-2xl">${p.icon}</div>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">${p.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black text-sm ${p.displaySum >= 0 ? 'text-emerald-600' : 'text-red-600'}">${p.displaySum > 0 ? '+' : ''}${p.displaySum}</p>
                        <p class="text-[10px] text-gray-400 font-bold">${p.games} 局</p>
                    </div>
                </div>
            `).join('');
        }

        function addEntry() {
            const p = document.getElementById('playerSelect').value;
            const s = document.getElementById('playerScore').value;
            if(!s) return;
            tempEntries.push(`${p} ${parseInt(s)>=0?'+':''}${parseInt(s)}`);
            renderEntries();
            document.getElementById('playerScore').value = '';
        }

        function renderEntries() {
            const container = document.getElementById('entryList');
            container.innerHTML = tempEntries.map((e, i) => `
                <div class="bg-white px-3 py-1 rounded-lg border font-black text-[10px] flex items-center gap-2 shadow-sm">
                    ${e} <span class="text-red-500 cursor-pointer" onclick="tempEntries.splice(${i},1);renderEntries()">×</span>
                </div>
            `).join('');
        }

        function saveFinalRecord() {
            const d = document.getElementById('newDate').value;
            const t = document.getElementById('newType').value;
            if(!d || tempEntries.length === 0) return alert("請填好日期同玩家分數！");
            const records = JSON.parse(localStorage.getItem('mj_v6_logs') || "[]");
            records.unshift({ d, t, s: tempEntries.join(', ') });
            localStorage.setItem('mj_v6_logs', JSON.stringify(records));
            tempEntries = [];
            alert("搞掂！");
            location.reload();
        }
async function fetchData() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = csvText.split('\n').filter(row => row.trim() !== '');
        const dataRows = rows.slice(1); // 跳過標題行

        // 將數據存入 ALL_PLAYERS
        ALL_PLAYERS = dataRows.map(row => {
            const cols = row.split(',').map(c => c.trim());
            return {
                name: cols[0],
                sum: parseInt(cols[1]) || 0,
                games: parseInt(cols[2]) || 0,
                winRate: parseFloat(cols[3]) || 0,
                max: parseInt(cols[4]) || 0,
                icon: cols[5] || '🀄',
                title: cols[6] || '雀友',
                comment: cols[7] || '',
                yearly: {
                    "2024": parseInt(cols[8]) || 0,
                    "2025": parseInt(cols[9]) || 0,
                    "2026": parseInt(cols[10]) || 0
                }
            };
        });
        console.log("✅ 成功轉換數據:", ALL_PLAYERS);
    } catch (error) {
        console.error("❌ 讀取失敗:", error);
    }
}
        window.onload = async () => {
    await fetchData(); // 等數據抓完
    
    if (ALL_PLAYERS.length > 0) {
        renderRank('all');
            
            // 名人堂
            const hall = document.getElementById('hallGrid');
            hall.innerHTML = ALL_PLAYERS.sort((a,b) => b.sum - a.sum).map(p => `
                <div class="tile-card p-6 bg-white flex flex-col items-center text-center h-full">
                    <div class="text-4xl mb-3">${p.icon}</div>
                    <span class="text-[10px] bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-black uppercase mb-2 block w-fit mx-auto">${p.title}</span>
                    <h3 class="text-xl font-black text-emerald-900">${p.name}</h3>
                    <p class="text-[11px] text-emerald-700 font-bold mt-2 mb-4 leading-relaxed bg-emerald-50/50 p-2 rounded-lg italic w-full">
                        "${p.comment}"
                    </p>
                    <div class="grid grid-cols-2 gap-4 mt-auto text-[11px] font-bold text-gray-400 w-full pt-4 border-t border-gray-50">
                        <div class="text-left">勝率: ${p.winRate}%</div><div class="text-right">總局數: ${p.games}</div>
                        <div class="text-left ${p.sum >= 0 ? 'text-emerald-600' : 'text-red-600'}">總盈虧: ${p.sum}</div><div class="text-right text-emerald-600">最高: +${p.max}</div>
                    </div>
                </div>
            `).join('');

            // 流水帳
            const container = document.getElementById('logsContainer');
            const saved = JSON.parse(localStorage.getItem('mj_v6_logs') || "[]");
            const logs = [...saved, 
                {d: "2026-04-08", t: "tai", s: "Ava +661, Annie -53, Haydrian -256, Tina -352"},
                {d: "2026-04-05", t: "tai", s: "Ava -152, Haydrian +304, Jack +19, Carissa -171"},
                {d: "2026-04-04", t: "tai", s: "Ava +727, Haydrian +37, Emily -500, Marco -264"},
                {d: "2026-03-25", t: "hk", s: "Ava +264, Yanyi +80, Haydrian -248, Karis -96"},
                {d: "2026-03-20", t: "tai", s: "Ava +289, Emily -98, Joey -14, Haydrian -177"}
            ];
            container.innerHTML = logs.map(l => `
                <div class="tile-card p-5 bg-white border-l-8 border-l-emerald-800">
                    <div class="flex justify-between text-[10px] font-black text-gray-400 mb-3"><span>${l.d}</span><span class="uppercase bg-emerald-800 text-white px-2 py-0.5 rounded">${l.t}</span></div>
                    <div class="flex flex-wrap gap-2">${l.s.split(',').map(item => `<span class="score-pill ${item.includes('+')?'win':'lose'}">${item.trim()}</span>`).join('')}</div>
                </div>
            `).join('');

            // Player Selector
            const pSelect = document.getElementById('playerSelect');
            ALL_PLAYERS.sort((a,b) => a.name.localeCompare(b.name)).forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.name; opt.innerText = p.name; pSelect.appendChild(opt);
            });
        };
    </script>
</body>
</html>
