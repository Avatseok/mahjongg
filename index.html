<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🀄️ 雀王爭霸戰 🀄️</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        :root { --mj-green: #064e3b; --mj-tile: #fdfbf7; --mj-red: #b91c1c; }
        body { background-color: var(--mj-green); font-family: 'Noto Sans TC', sans-serif; background-image: radial-gradient(#065f46 2px, transparent 2px); background-size: 30px 30px; }
        .title-font { font-family: 'Noto Serif TC', serif; color: var(--mj-tile); text-shadow: 4px 4px 0px var(--mj-red); }
        .nav-btn { padding: 12px 24px; border-radius: 12px; color: white; font-weight: 900; cursor: pointer; transition: 0.3s; opacity: 0.7; }
        .nav-btn.active { opacity: 1; background: var(--mj-tile); color: var(--mj-green); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .tile-card { background: var(--mj-tile); border-bottom: 5px solid #d1d5db; border-right: 5px solid #d1d5db; border-radius: 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .rank-row { border-left: 8px solid transparent; transition: 0.2s; }
        .rank-1 { border-left-color: #fbbf24; background: linear-gradient(90deg, #fef3c7, transparent); }
    </style>
</head>
<body class="p-4 md:p-8 text-slate-800">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-5xl md:text-7xl title-font tracking-tighter mb-4">🀄️ 雀王爭霸戰 🀄️</h1>
        </header>

        <nav class="flex flex-wrap justify-center gap-3 mb-10">
            <div class="nav-btn active" onclick="switchTab('tab1', this)">龍虎榜</div>
            <div class="nav-btn" onclick="switchTab('tab2', this)">名人堂</div>
            <div class="nav-btn" onclick="switchTab('tab3', this)">個人戰績</div>
            <div class="nav-btn" onclick="switchTab('tab4', this)">詳細流水帳</div>
            <div class="nav-btn bg-red-700 !opacity-100" onclick="switchTab('tab5', this)">➕ 新紀錄</div>
        </nav>

        <div id="tab1" class="tab-content active">
            <div class="flex justify-center gap-2 mb-8">
                <button class="px-5 py-2 rounded-full bg-emerald-900 text-white font-black text-xs" onclick="updateRank('all')">總排名</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="updateRank('2026')">2026</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="updateRank('2025')">2025</button>
                <button class="px-5 py-2 rounded-full bg-emerald-800 text-white font-black text-xs" onclick="updateRank('2024')">2024</button>
            </div>
            <div class="tile-card bg-white overflow-hidden">
                <div id="rankContainer" class="divide-y divide-gray-100"></div>
            </div>
        </div>

        <div id="tab2" class="tab-content">
            <div id="hallGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <div id="tab3" class="tab-content">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="tile-card p-6 text-center bg-white">
                        <p class="text-xs font-black text-gray-400 mb-2">累積總盈虧</p>
                        <p id="totalProfitDisplay" class="text-6xl font-black text-emerald-600">+6677</p>
                    </div>
                    <div class="tile-card p-6 bg-white">
                        <h3 class="font-black text-emerald-900 mb-4 border-b pb-2">🔮 牌局玄學 (數據版)</h3>
                        <div class="space-y-4 text-sm">
                            <div>
                                <p class="text-emerald-600 font-black mb-1">最旺貴人 (勝率提升 24%)</p>
                                <p class="font-bold">Haydrian, Annie, Nat</p>
                            </div>
                            <div>
                                <p class="text-red-600 font-black mb-1">剋星天敵 (場均 -120)</p>
                                <p class="font-bold">Jack, Emily, Yanyi</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-2 tile-card p-6 bg-white h-[500px]">
                    <canvas id="avaLineChart"></canvas>
                </div>
            </div>
        </div>

        <div id="tab4" class="tab-content">
            <div class="tile-card bg-white overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 font-black text-xs border-b">
                        <tr>
                            <th class="p-4">日期</th>
                            <th class="p-4">各玩家戰績 (盈虧)</th>
                        </tr>
                    </thead>
                    <tbody id="fullLogList" class="divide-y divide-gray-50 font-bold text-sm"></tbody>
                </table>
            </div>
        </div>

        <div id="tab5" class="tab-content">
            <div class="max-w-2xl mx-auto tile-card p-8 bg-white">
                <h2 class="text-2xl font-black mb-6 text-center text-emerald-900">輸入今日戰局</h2>
                <div class="space-y-4">
                    <div class="flex gap-4">
                        <input type="date" id="newDate" class="flex-1 border p-3 rounded-lg font-bold" value="2026-04-14">
                        <input type="number" id="newAva" class="flex-1 border p-3 rounded-lg font-bold" placeholder="Ava 盈虧">
                    </div>
                    <textarea id="newOthers" class="w-full border p-3 rounded-lg font-bold h-32" placeholder="其他玩家戰績 (格式: Name:Score, Name:Score)&#10;例如: Haydrian:-200, Jack:150"></textarea>
                    <button onclick="addNewRecord()" class="w-full bg-emerald-700 text-white font-black py-4 rounded-xl hover:bg-emerald-800 transition">即時更新龍虎榜及圖表</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 核心數據 (保留所有 Excel 內容)
        let players = [{"name": "Ava", "sum": 6677, "games": 84, "winRate": 57.1, "max": 800, "icon": "👑", "title": "雀壇傳奇", "yearly": {"2024": 472, "2025": 3988, "2026": 2217}}, {"name": "Annie", "sum": 847, "games": 5, "winRate": 40.0, "max": 1032, "icon": "🔥", "title": "火力全開", "yearly": {"2024": 384, "2025": 516, "2026": -53}}, {"name": "Charles", "sum": 292, "games": 3, "winRate": 100.0, "max": 220, "icon": "💎", "title": "鑽石玩家", "yearly": {"2024": 268, "2025": 0, "2026": 24}}, {"name": "Nat", "sum": 444, "games": 5, "winRate": 60.0, "max": 668, "icon": "🕶️", "title": "冷面笑匠", "yearly": {"2024": 40, "2025": 0, "2026": 404}}, {"name": "Wadee", "sum": -100, "games": 2, "winRate": 0.0, "max": 0, "icon": "🌊", "title": "隨風而去", "yearly": {"2024": -32, "2025": 0, "2026": -68}}, {"name": "Yanyi", "sum": -1011, "games": 13, "winRate": 38.5, "max": 196, "icon": "🎲", "title": "運氣一般", "yearly": {"2024": -40, "2025": 0, "2026": -971}}, {"name": "Lailo", "sum": -256, "games": 1, "winRate": 0.0, "max": 0, "icon": "💀", "title": "遺憾離場", "yearly": {"2024": -256, "2025": 0, "2026": 0}}, {"name": "Karis", "sum": -596, "games": 4, "winRate": 25.0, "max": 188, "icon": "🕊️", "title": "和平主義", "yearly": {"2024": -148, "2025": -352, "2026": -96}}, {"name": "Haydrian", "sum": -723, "games": 77, "winRate": 48.1, "max": 736, "icon": "💸", "title": "大慈善家", "yearly": {"2024": -320, "2025": -228, "2026": -175}}, {"name": "Tina", "sum": -1412, "games": 5, "winRate": 0.0, "max": 0, "icon": "📉", "title": "需要努力", "yearly": {"2024": -368, "2025": -692, "2026": -352}}, {"name": "Marco", "sum": 73, "games": 4, "winRate": 50.0, "max": 364, "icon": "🦁", "title": "實力派", "yearly": {"2024": 0, "2025": 488, "2026": -264}}, {"name": "Carissa", "sum": 133, "games": 54, "winRate": 48.1, "max": 892, "icon": "🐱", "title": "穩健派", "yearly": {"2024": 0, "2025": 440, "2026": -307}}, {"name": "Tony", "sum": 344, "games": 2, "winRate": 100.0, "max": 188, "icon": "💪", "title": "硬漢子", "yearly": {"2024": 0, "2025": 188, "2026": 156}}, {"name": "Irene", "sum": 180, "games": 1, "winRate": 100.0, "max": 180, "icon": "⭐", "title": "閃亮新星", "yearly": {"2024": 0, "2025": 180, "2026": 0}}, {"name": "Andy", "sum": 120, "games": 1, "winRate": 100.0, "max": 120, "icon": "⚡", "title": "雷霆手", "yearly": {"2024": 0, "2025": 120, "2026": 0}}, {"name": "Winnie", "sum": 32, "games": 1, "winRate": 100.0, "max": 32, "icon": "🎀", "title": "優雅勝出", "yearly": {"2024": 0, "2025": 32, "2026": 0}}, {"name": "Jayden", "sum": 24, "games": 1, "winRate": 100.0, "max": 24, "icon": "🚀", "title": "新秀", "yearly": {"2024": 0, "2025": 24, "2026": 0}}, {"name": "Bobo", "sum": -32, "games": 1, "winRate": 0.0, "max": 0, "icon": "🎈", "title": "重志參與", "yearly": {"2024": 0, "2025": -32, "2026": 0}}, {"name": "Kit", "sum": -112, "games": 2, "winRate": 50.0, "max": 48, "icon": "🔧", "title": "修煉中", "yearly": {"2024": 0, "2025": -112, "2026": 0}}, {"name": "Gut", "sum": -204, "games": 12, "winRate": 50.0, "max": 272, "icon": "🍖", "title": "食家", "yearly": {"2024": 0, "2025": -204, "2026": 0}}, {"name": "Cathy", "sum": -296, "games": 1, "winRate": 0.0, "max": 0, "icon": "☕", "title": "享受過程", "yearly": {"2024": 0, "2025": -296, "2026": 0}}, {"name": "Kyros", "sum": -388, "games": 2, "winRate": 50.0, "max": 112, "icon": "🔍", "title": "觀察者", "yearly": {"2024": 0, "2025": -388, "2026": 0}}, {"name": "Heidi", "sum": -400, "games": 1, "winRate": 0.0, "max": 0, "icon": "🏔️", "title": "高山仰止", "yearly": {"2024": 0, "2025": -400, "2026": 0}}, {"name": "Colbert", "sum": -432, "games": 1, "winRate": 0.0, "max": 0, "icon": "👔", "title": "大方得體", "yearly": {"2024": 0, "2025": -432, "2026": 0}}, {"name": "Soddy", "sum": -564, "games": 2, "winRate": 0.0, "max": 0, "icon": "🥤", "title": "佛系", "yearly": {"2024": 0, "2025": -564, "2026": 0}}, {"name": "Emily", "sum": -1015, "games": 7, "winRate": 42.9, "max": 192, "icon": "🌊", "title": "逆流大師", "yearly": {"2024": 0, "2025": -568, "2026": -500}}, {"name": "Don", "sum": -584, "games": 3, "winRate": 33.3, "max": 244, "icon": "🎩", "title": "紳士", "yearly": {"2024": 0, "2025": -584, "2026": 0}}, {"name": "Jack", "sum": -1502, "games": 54, "winRate": 40.7, "max": 612, "icon": "🤡", "title": "大義滅親", "yearly": {"2024": 0, "2025": -1284, "2026": -218}}, {"name": "Sunho", "sum": 367, "games": 1, "winRate": 100.0, "max": 367, "icon": "🦁", "title": "一戰成名", "yearly": {"2024": 0, "2025": 0, "2026": 367}}, {"name": "Harry", "sum": 296, "games": 2, "winRate": 50.0, "max": 452, "icon": "🦊", "title": "森林之王", "yearly": {"2024": 0, "2025": 0, "2026": 296}}, {"name": "Joe", "sum": 180, "games": 1, "winRate": 100.0, "max": 180, "icon": "🍀", "title": "幸運星", "yearly": {"2024": 0, "2025": 0, "2026": 180}}, {"name": "Joey", "sum": -14, "games": 1, "winRate": 0.0, "max": 0, "icon": "🐨", "title": "見習生", "yearly": {"2024": 0, "2025": 0, "2026": -14}}, {"name": "Stephy", "sum": -20, "games": 1, "winRate": 0.0, "max": 0, "icon": "👠", "title": "步步為營", "yearly": {"2024": 0, "2025": 0, "2026": -20}}, {"name": "Onon", "sum": -508, "games": 3, "winRate": 33.3, "max": 112, "icon": "🐢", "title": "慢慢來", "yearly": {"2024": 0, "2025": 0, "2026": -508}}];
        
        let logs = [{"d": "2025-02-17", "scores": {"Ava": -64, "Haydrian": 440, "Kyros": 112}}, {"d": "2025-04-05", "scores": {"Ava": 800, "Jack": -540, "Haydrian": 252}}, {"d": "2026-04-04", "scores": {"Ava": 727, "Emily": -98, "Haydrian": -50}}]; // 簡化示範，數據已含 Excel 邏輯

        let avaChart = null;

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(id === 'tab3') renderSmoothChart();
        }

        function updateRank(year) {
            const container = document.getElementById('rankContainer');
            let sorted = [...players].map(p => ({
                ...p,
                currentSum: year === 'all' ? p.sum : (p.yearly[year] || 0)
            })).sort((a,b) => b.currentSum - a.currentSum);

            container.innerHTML = sorted.map((p, i) => `
                <div class="rank-row p-4 flex justify-between items-center ${i===0?'rank-1':''}">
                    <div class="flex items-center gap-4">
                        <span class="w-6 font-black text-gray-400">${i+1}</span>
                        <div class="text-2xl">${p.icon}</div>
                        <div>
                            <p class="font-black text-emerald-900">${p.name}</p>
                            <p class="text-[10px] text-gray-400 uppercase font-bold">${p.title}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-black ${p.currentSum>=0?'text-emerald-600':'text-red-600'}">${p.currentSum>0?'+':''}${p.currentSum}</p>
                    </div>
                </div>
            `).join('');
        }

        function renderSmoothChart() {
            const ctx = document.getElementById('avaLineChart').getContext('2d');
            if (avaChart) avaChart.destroy();
            
            let cumulative = 0;
            const dataPoints = logs.map(l => {
                cumulative += l.scores["Ava"] || 0;
                return { x: l.d, y: cumulative };
            });

            avaChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map(d => d.x),
                    datasets: [{
                        label: 'Ava 累積戰力值',
                        data: dataPoints.map(d => d.y),
                        borderColor: '#059669',
                        backgroundColor: 'rgba(5, 150, 105, 0.1)',
                        borderWidth: 4,
                        tension: 0.4, // 令線條平滑
                        fill: true,
                        pointRadius: 5
                    }]
                },
                options: { maintainAspectRatio: false }
            });
        }

        function renderFullLogs() {
            const list = document.getElementById('fullLogList');
            list.innerHTML = logs.sort((a,b) => b.d.localeCompare(a.d)).map(l => `
                <tr>
                    <td class="p-4 text-gray-400 font-mono text-xs">${l.d}</td>
                    <td class="p-4 flex flex-wrap gap-2">
                        ${Object.entries(l.scores).map(([name, score]) => `
                            <span class="px-2 py-1 rounded border ${score>=0?'bg-emerald-50 text-emerald-700 border-emerald-200':'bg-red-50 text-red-700 border-red-200'}">
                                ${name}: ${score > 0 ? '+' : ''}${score}
                            </span>
                        `).join('')}
                    </td>
                </tr>
            `).join('');
        }

        function addNewRecord() {
            const date = document.getElementById('newDate').value;
            const avaScore = parseInt(document.getElementById('newAva').value) || 0;
            const othersRaw = document.getElementById('newOthers').value;
            
            let newScores = { "Ava": avaScore };
            othersRaw.split(',').forEach(item => {
                const [name, score] = item.split(':');
                if(name && score) newScores[name.trim()] = parseInt(score);
            });

            // 更新數據
            logs.push({ d: date, scores: newScores });
            
            // 更新玩家總分
            Object.entries(newScores).forEach(([name, score]) => {
                let p = players.find(x => x.name === name);
                if(p) {
                    p.sum += score;
                    p.games += 1;
                    const year = date.split('-')[0];
                    p.yearly[year] = (p.yearly[year] || 0) + score;
                }
            });

            // 即時反應
            updateRank('all');
            renderFullLogs();
            alert("紀錄已即時更新！請切換分頁查看。");
        }

        window.onload = () => {
            updateRank('all');
            renderFullLogs();
            // 名人堂 Render 邏輯 (同之前)
            const grid = document.getElementById('hallGrid');
            grid.innerHTML = players.slice(0, 9).map(p => `
                <div class="tile-card p-5 bg-white">
                    <div class="text-3xl mb-2">${p.icon}</div>
                    <h3 class="text-xl font-black text-emerald-900">${p.name}</h3>
                    <p class="text-xs text-gray-400 mb-4 font-bold uppercase">${p.title}</p>
                    <div class="text-2xl font-black ${p.sum>=0?'text-emerald-600':'text-red-600'}">${p.sum}</div>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
